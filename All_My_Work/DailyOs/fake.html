<!DOCTYPE html>
<html lang="en" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DailyOS | Digital Toolbox</title>
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#3b82f6',
                        darkBg: '#0f172a',
                        darkCard: '#1e293b'
                    }
                }
            }
        }
    </script>
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .dark ::-webkit-scrollbar-thumb { background: #475569; }
        
        /* Smooth Fade In */
        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Typing Cursor Animation */
        .cursor-blink { animation: blink 0.8s step-end infinite; }
        @keyframes blink { 50% { opacity: 0; } }

        /* Memory Game Styles */
        .memory-card { transition: transform 0.3s; transform-style: preserve-3d; }
        .memory-card.flipped { transform: rotateY(180deg); }
        .memory-card-front, .memory-card-back { backface-visibility: hidden; position: absolute; top:0; left:0; width:100%; height:100%; display:flex; justify-content:center; align-items:center; border-radius: 0.5rem; }
        .memory-card-front { transform: rotateY(180deg); background: white; font-size: 2rem; }
        .dark .memory-card-front { background: #334155; }
        .memory-card-back { background: #3b82f6; color: white; font-size: 1.5rem; }

        /* Print Media for Invoice & Reports */
        @media print {
            body * { visibility: hidden; }
            #tool-content, #tool-content * { visibility: visible; }
            #tool-content { position: absolute; left: 0; top: 0; width: 100%; padding: 0 !important; }
            .no-print { display: none !important; }
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 dark:bg-darkBg dark:text-gray-100 transition-colors duration-300 min-h-screen flex flex-col font-sans overflow-x-hidden">

    <!-- Navigation -->
    <nav class="sticky top-0 z-50 bg-white/90 dark:bg-darkCard/90 backdrop-blur-md border-b border-gray-200 dark:border-slate-700 shadow-sm">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <div class="flex items-center gap-2 cursor-pointer" onclick="goHome()">
                    <div class="bg-blue-600 text-white p-2 rounded-lg shadow-sm">
                        <i class="ph ph-toolbox text-xl"></i>
                    </div>
                    <span class="font-bold text-xl tracking-tight">Daily<span class="text-blue-600 dark:text-blue-400">OS</span></span>
                </div>
                <div class="flex items-center gap-2 md:gap-4">
                    <button id="theme-toggle" class="p-2 rounded-full hover:bg-gray-100 dark:hover:bg-slate-700 transition-colors" onclick="toggleTheme()" aria-label="Toggle Theme">
                        <i class="ph ph-moon text-xl dark:hidden"></i>
                        <i class="ph ph-sun text-xl hidden dark:block text-yellow-400"></i>
                    </button>
                    <!-- Mobile 3-Dot Menu -->
                    <div class="md:hidden relative">
                        <button onclick="toggleMobileMenu(event)" class="p-2 rounded-full hover:bg-gray-100 dark:hover:bg-slate-700 transition-colors" aria-label="Menu">
                            <i class="ph ph-dots-three-vertical text-2xl font-bold"></i>
                        </button>
                        <div id="mobile-menu" class="hidden absolute right-0 mt-2 w-56 bg-white dark:bg-darkCard rounded-xl shadow-xl border border-gray-200 dark:border-slate-700 overflow-hidden z-50 transition-all">
                            <ul class="py-2" id="mobile-menu-list">
                                <!-- Populated by JS -->
                            </ul>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content Area -->
    <main class="flex-grow max-w-7xl mx-auto w-full px-4 sm:px-6 lg:px-8 py-6 md:py-10 relative">
        
        <!-- 1. Landing Page (Category Dashboard) -->
        <div id="dashboard-view" class="fade-in space-y-8 sm:space-y-12">
            <!-- Header with Typing Animation -->
            <div class="text-center mb-8 sm:mb-12 min-h-[100px] md:min-h-[120px] flex flex-col justify-center items-center px-2">
                <h1 class="text-3xl sm:text-4xl md:text-5xl font-extrabold text-gray-900 dark:text-white mb-3 sm:mb-4">
                    <span id="typed-title"></span><span class="cursor-blink border-r-[3px] sm:border-r-4 border-blue-600 ml-1 inline-block h-7 sm:h-9 md:h-10 align-middle"></span>
                </h1>
                <p class="text-base sm:text-lg md:text-xl text-gray-600 dark:text-gray-400 px-4" id="typed-subtitle"></p>
            </div>
            
            <!-- Category Grid -->
            <div id="category-grid" class="grid grid-cols-1 md:grid-cols-2 gap-4 sm:gap-6 max-w-5xl mx-auto">
                <!-- Dynamically populated by JS -->
            </div>
        </div>

        <!-- 2. Category View (Tools inside a selected category) -->
        <div id="category-view" class="hidden fade-in space-y-6 sm:space-y-8">
            <div class="mb-2 sm:mb-4">
                <button onclick="goHome()" class="flex items-center gap-2 text-gray-600 dark:text-gray-300 hover:text-blue-600 dark:hover:text-blue-400 transition-colors font-bold bg-white dark:bg-slate-800 shadow-sm border border-gray-200 dark:border-slate-700 px-4 py-2.5 rounded-xl w-max">
                    <i class="ph ph-arrow-left text-lg"></i> Back to Home
                </button>
            </div>
            
            <div id="category-header" class="text-center mb-6 sm:mb-10 pb-6 sm:pb-8 border-b border-gray-200 dark:border-slate-700 px-4">
                <!-- Dynamically populated -->
            </div>
            
            <div id="tools-grid" class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 gap-3 sm:gap-4 lg:gap-5">
                <!-- Dynamically populated -->
            </div>
        </div>

        <!-- 3. Tool View (The actual app/tool) -->
        <div id="tool-view" class="hidden fade-in">
            <div class="mb-4 sm:mb-6 flex items-center justify-between">
                <button onclick="goBackToCategory()" class="flex items-center justify-center p-2 sm:px-4 sm:py-2 rounded-xl text-gray-600 dark:text-gray-300 hover:bg-white dark:hover:bg-slate-800 transition-colors font-medium shadow-sm border border-transparent hover:border-gray-200 dark:hover:border-slate-700 no-print">
                    <i class="ph ph-arrow-left text-xl sm:text-lg sm:mr-2"></i> <span class="hidden sm:inline">Back</span>
                </button>
                <h2 id="tool-title" class="text-xl sm:text-2xl font-bold text-gray-800 dark:text-white flex items-center gap-2 text-center"></h2>
                <div class="w-10 sm:w-24"></div> <!-- Spacer for centering -->
            </div>
            <div id="tool-content" class="bg-white dark:bg-darkCard rounded-2xl shadow-sm border border-gray-200 dark:border-slate-700 p-4 sm:p-6 lg:p-8 min-h-[60vh]">
                <!-- Tool content injected here -->
            </div>
        </div>

    </main>

    <!-- Footer -->
    <footer class="border-t border-gray-200 dark:border-slate-700 py-6 mt-auto bg-gray-50 dark:bg-darkBg">
        <div class="text-center text-sm text-gray-500 dark:text-gray-400 px-4">
            &copy; 2026 DailyOS Digital Toolbox. Powered by GLOWZY.
        </div>
    </footer>

    <!-- Core Logic & Tool Implementations -->
    <script>
        // --- System State & Theme ---
        const initTheme = () => {
            if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                document.documentElement.classList.add('dark');
            } else {
                document.documentElement.classList.remove('dark');
            }
        };
        
        const toggleTheme = () => {
            document.documentElement.classList.toggle('dark');
            localStorage.theme = document.documentElement.classList.contains('dark') ? 'dark' : 'light';
        };

        window.activeCategory = null; 

        // --- Data Structure ---
        const osData = [
            {
                category: "Student Tools",
                icon: "ph-student",
                color: "text-blue-500",
                bg: "bg-blue-50 dark:bg-blue-500/10",
                desc: "Calculators, notes, and academic trackers.",
                tools: [
                    { id: "calc", name: "Smart Calculator", icon: "ph-calculator", render: renderCalculator },
                    { id: "notes", name: "Notes Saver", icon: "ph-notepad", render: renderNotes },
                    { id: "gpa", name: "GPA Calculator", icon: "ph-graduation-cap", render: renderGPACalc },
                    { id: "unit", name: "Unit Converter", icon: "ph-arrows-left-right", render: renderUnitConverter }
                ]
            },
            {
                category: "Shopkeeper Tools",
                icon: "ph-storefront",
                color: "text-green-500",
                bg: "bg-green-50 dark:bg-green-500/10",
                desc: "Sales tracking, invoices, and profit tools.",
                tools: [
                    { id: "profit", name: "Profit/Loss Calc", icon: "ph-trend-up", render: renderProfitLoss },
                    { id: "invoice", name: "Simple Invoice", icon: "ph-receipt", render: renderInvoice },
                    { id: "sales", name: "Daily Sales", icon: "ph-coins", render: renderSales }
                ]
            },
            {
                category: "Teacher Tools",
                icon: "ph-chalkboard-teacher",
                color: "text-purple-500",
                bg: "bg-purple-50 dark:bg-purple-500/10",
                desc: "Student pickers and marks calculation.",
                tools: [
                    { id: "picker", name: "Random Student", icon: "ph-users-three", render: renderStudentPicker },
                    { id: "marks", name: "Marks Calculator", icon: "ph-exam", render: renderMarksCalc }
                ]
            },
            {
                category: "For Everyone",
                icon: "ph-globe-hemisphere-west",
                color: "text-orange-500",
                bg: "bg-orange-50 dark:bg-orange-500/10",
                desc: "Daily utilities, passwords, and mini-games.",
                tools: [
                    { id: "todo", name: "To-Do List", icon: "ph-check-square-offset", render: renderTodo },
                    { id: "money", name: "Money Tracker", icon: "ph-wallet", render: renderMoneyTracker },
                    { id: "pwd", name: "Password Gen", icon: "ph-password", render: renderPasswordGen },
                    { id: "age", name: "Age Calculator", icon: "ph-calendar", render: renderAgeCalc },
                    { id: "memory", name: "Memory Game", icon: "ph-puzzle-piece", render: renderMemoryGame }
                ]
            }
        ];

        // --- Core Navigation & UI Setup ---

        function typeEffect() {
            const title = "Your Digital Toolbox";
            const subtitle = "Everything you need, instantly available in your browser.";
            const titleEl = document.getElementById('typed-title');
            const subtitleEl = document.getElementById('typed-subtitle');
            const cursorEl = document.querySelector('.cursor-blink');
            
            if(sessionStorage.getItem('typed')) {
                titleEl.innerText = title;
                subtitleEl.innerText = subtitle;
                cursorEl.style.display = 'none';
                return;
            }

            let i = 0, j = 0;
            titleEl.innerText = ''; subtitleEl.innerText = '';
            
            function typeTitle() {
                if (i < title.length) {
                    titleEl.innerText += title.charAt(i);
                    i++;
                    setTimeout(typeTitle, 50);
                } else {
                    setTimeout(typeSubtitle, 200);
                }
            }
            
            function typeSubtitle() {
                if (j < subtitle.length) {
                    subtitleEl.innerText += subtitle.charAt(j);
                    j++;
                    setTimeout(typeSubtitle, 25);
                } else {
                    sessionStorage.setItem('typed', 'true');
                    setTimeout(() => { cursorEl.style.display = 'none'; }, 2000);
                }
            }
            
            typeTitle();
        }

        function toggleMobileMenu(e) {
            e.stopPropagation();
            document.getElementById('mobile-menu').classList.toggle('hidden');
        }

        document.addEventListener('click', (e) => {
            const menu = document.getElementById('mobile-menu');
            if(menu && !menu.classList.contains('hidden') && !e.target.closest('.md\\:hidden')) {
                menu.classList.add('hidden');
            }
        });

        function buildDashboard() {
            const catGrid = document.getElementById('category-grid');
            const mobileMenuList = document.getElementById('mobile-menu-list');
            
            catGrid.innerHTML = '';
            mobileMenuList.innerHTML = `<li class="px-5 py-3.5 hover:bg-gray-50 dark:hover:bg-slate-700/50 cursor-pointer text-blue-600 dark:text-blue-400 font-bold border-b border-gray-100 dark:border-slate-700 flex items-center gap-3 transition-colors" onclick="goHome()"><i class="ph ph-house text-xl"></i> Home Dashboard</li>`;

            osData.forEach((cat, index) => {
                const card = document.createElement('div');
                card.className = `bg-white dark:bg-darkCard rounded-2xl p-6 sm:p-8 shadow-sm hover:shadow-xl border border-gray-200 dark:border-slate-700 cursor-pointer transition-all duration-300 hover:-translate-y-1.5 flex flex-col sm:flex-row items-center sm:items-start text-center sm:text-left gap-4 sm:gap-6 group`;
                card.onclick = () => openCategory(index);
                
                card.innerHTML = `
                    <div class="text-5xl sm:text-6xl text-gray-400 group-hover:${cat.color} transition-colors ${cat.bg} p-4 sm:p-5 rounded-2xl shrink-0">
                        <i class="ph ${cat.icon}"></i>
                    </div>
                    <div class="flex flex-col justify-center h-full w-full">
                        <h3 class="text-xl sm:text-2xl font-extrabold text-gray-800 dark:text-white mb-1.5 group-hover:${cat.color} transition-colors">${cat.category}</h3>
                        <p class="text-gray-500 dark:text-gray-400 text-sm mb-3 sm:mb-4 leading-relaxed">${cat.desc}</p>
                        <div class="mt-auto flex justify-center sm:justify-start">
                            <span class="inline-block px-3 py-1.5 bg-gray-100 dark:bg-slate-800 text-xs font-bold text-gray-600 dark:text-gray-300 rounded-lg">${cat.tools.length} Apps Ready</span>
                        </div>
                    </div>
                `;
                catGrid.appendChild(card);

                mobileMenuList.innerHTML += `<li class="px-5 py-3.5 hover:bg-gray-50 dark:hover:bg-slate-700/50 cursor-pointer flex items-center gap-3 text-gray-700 dark:text-gray-200 font-medium border-b border-gray-50 dark:border-slate-700/50 transition-colors" onclick="openCategory(${index})"><i class="ph ${cat.icon} ${cat.color} text-2xl"></i> ${cat.category}</li>`;
            });

            typeEffect();
        }

        function openCategory(index) {
            window.activeCategory = index;
            const cat = osData[index];
            
            document.getElementById('dashboard-view').classList.add('hidden');
            document.getElementById('tool-view').classList.add('hidden');
            document.getElementById('category-view').classList.remove('hidden');
            document.getElementById('mobile-menu').classList.add('hidden');

            document.getElementById('category-header').innerHTML = `
                <div class="inline-block p-4 sm:p-5 rounded-2xl ${cat.bg} ${cat.color} mb-3 sm:mb-4 text-4xl sm:text-5xl shadow-inner">
                    <i class="ph ${cat.icon}"></i>
                </div>
                <h2 class="text-3xl sm:text-4xl font-extrabold text-gray-900 dark:text-white">${cat.category}</h2>
                <p class="text-gray-500 dark:text-gray-400 mt-2 text-sm sm:text-base">${cat.desc}</p>
            `;

            const toolsGrid = document.getElementById('tools-grid');
            toolsGrid.innerHTML = '';

            cat.tools.forEach(tool => {
                const card = document.createElement('div');
                card.className = 'bg-white dark:bg-darkCard rounded-xl p-5 sm:p-6 shadow-sm hover:shadow-md border border-gray-200 dark:border-slate-700 cursor-pointer transition-all duration-200 hover:-translate-y-1 flex flex-col items-center justify-center text-center gap-2 sm:gap-3 group';
                card.onclick = () => openTool(tool);
                card.innerHTML = `
                    <div class="text-4xl sm:text-5xl text-gray-400 group-hover:${cat.color} transition-colors mb-1 sm:mb-2">
                        <i class="ph ${tool.icon}"></i>
                    </div>
                    <h3 class="font-bold text-gray-800 dark:text-gray-100 text-sm sm:text-base">${tool.name}</h3>
                `;
                toolsGrid.appendChild(card);
            });
            window.scrollTo(0, 0);
        }

        function openTool(tool) {
            document.getElementById('dashboard-view').classList.add('hidden');
            document.getElementById('category-view').classList.add('hidden');
            document.getElementById('tool-view').classList.remove('hidden');
            document.getElementById('mobile-menu').classList.add('hidden');
            
            document.getElementById('tool-title').innerHTML = `<i class="ph ${tool.icon} hidden sm:inline"></i> ${tool.name}`;
            
            const toolContent = document.getElementById('tool-content');
            toolContent.innerHTML = ''; 
            tool.render(toolContent);
            window.scrollTo(0, 0);
        }

        function goBackToCategory() {
            if (window.activeCategory !== null) {
                openCategory(window.activeCategory);
            } else {
                goHome();
            }
        }

        function goHome() {
            window.activeCategory = null;
            document.getElementById('tool-view').classList.add('hidden');
            document.getElementById('category-view').classList.add('hidden');
            document.getElementById('dashboard-view').classList.remove('hidden');
            document.getElementById('mobile-menu').classList.add('hidden');
            document.getElementById('tool-content').innerHTML = ''; 
            window.scrollTo(0, 0);
        }

        // ==========================================
        // TOOL IMPLEMENTATIONS 
        // ==========================================

        // 1. Notes Saver
        function renderNotes(container) {
            const saved = localStorage.getItem('dailyos_notes') || '';
            container.innerHTML = `
                <div class="flex flex-col h-full gap-3 sm:gap-4">
                    <p class="text-xs sm:text-sm text-gray-500">Your notes are saved automatically to your device.</p>
                    <textarea id="note-area" class="w-full flex-grow min-h-[300px] sm:min-h-[400px] p-4 rounded-xl border border-gray-300 dark:border-slate-600 bg-gray-50 dark:bg-slate-800 focus:ring-2 focus:ring-blue-500 outline-none resize-none transition-colors text-base sm:text-lg" placeholder="Type your notes here...">${saved}</textarea>
                    <button onclick="document.getElementById('note-area').value=''; localStorage.removeItem('dailyos_notes')" class="w-full sm:w-max self-end px-6 py-3 sm:py-2 text-red-600 hover:bg-red-50 dark:hover:bg-red-900/20 rounded-lg transition-colors font-medium border border-red-200 sm:border-transparent">Clear All Notes</button>
                </div>
            `;
            document.getElementById('note-area').addEventListener('input', (e) => {
                localStorage.setItem('dailyos_notes', e.target.value);
            });
        }

        // 2. To-Do List
        function renderTodo(container) {
            container.innerHTML = `
                <div class="max-w-2xl mx-auto">
                    <div class="flex flex-col sm:flex-row gap-2 sm:gap-3 mb-6">
                        <input type="text" id="todo-input" class="w-full sm:flex-grow p-3.5 rounded-xl border border-gray-300 dark:border-slate-600 bg-white dark:bg-slate-800 focus:ring-2 focus:ring-blue-500 outline-none" placeholder="Add a new task..." onkeypress="if(event.key === 'Enter') addTodo()">
                        <button onclick="addTodo()" class="w-full sm:w-auto bg-blue-600 text-white px-8 py-3.5 rounded-xl hover:bg-blue-700 transition-colors font-bold shadow-sm">Add</button>
                    </div>
                    <ul id="todo-list" class="space-y-3"></ul>
                </div>
            `;
            loadTodos();
        }
        
        function loadTodos() {
            const todos = JSON.parse(localStorage.getItem('dailyos_todos') || '[]');
            const list = document.getElementById('todo-list');
            list.innerHTML = '';
            todos.forEach((todo, index) => {
                list.innerHTML += `
                    <li class="flex items-center justify-between p-4 bg-gray-50 dark:bg-slate-800/50 rounded-xl border border-gray-200 dark:border-slate-700 hover:shadow-sm transition-shadow">
                        <div class="flex items-start sm:items-center gap-3 sm:gap-4 cursor-pointer flex-grow" onclick="toggleTodo(${index})">
                            <div class="w-6 h-6 shrink-0 mt-0.5 sm:mt-0 rounded-full border-2 flex items-center justify-center transition-colors ${todo.done ? 'bg-green-500 border-green-500' : 'border-gray-400 dark:border-gray-500'}">
                                ${todo.done ? '<i class="ph ph-check text-white text-sm"></i>' : ''}
                            </div>
                            <span class="text-sm sm:text-base leading-snug ${todo.done ? 'line-through text-gray-400 dark:text-gray-500' : 'text-gray-800 dark:text-gray-100'}">${todo.text}</span>
                        </div>
                        <button onclick="deleteTodo(${index}); event.stopPropagation();" class="text-red-400 hover:text-red-600 hover:bg-red-50 dark:hover:bg-red-900/30 p-2 rounded-full transition-colors ml-2"><i class="ph ph-trash text-lg sm:text-xl"></i></button>
                    </li>
                `;
            });
        }

        function addTodo() {
            const input = document.getElementById('todo-input');
            const text = input.value.trim();
            if(!text) return;
            const todos = JSON.parse(localStorage.getItem('dailyos_todos') || '[]');
            todos.push({ text, done: false });
            localStorage.setItem('dailyos_todos', JSON.stringify(todos));
            input.value = '';
            loadTodos();
        }

        function toggleTodo(index) {
            const todos = JSON.parse(localStorage.getItem('dailyos_todos') || '[]');
            todos[index].done = !todos[index].done;
            localStorage.setItem('dailyos_todos', JSON.stringify(todos));
            loadTodos();
        }

        function deleteTodo(index) {
            const todos = JSON.parse(localStorage.getItem('dailyos_todos') || '[]');
            todos.splice(index, 1);
            localStorage.setItem('dailyos_todos', JSON.stringify(todos));
            loadTodos();
        }

        // 3. Password Generator
        function renderPasswordGen(container) {
            container.innerHTML = `
                <div class="max-w-xl mx-auto space-y-6 sm:space-y-8">
                    <div class="p-4 sm:p-6 bg-gray-100 dark:bg-slate-800 rounded-2xl flex flex-col sm:flex-row justify-between items-center sm:items-center gap-4 border border-gray-200 dark:border-slate-700">
                        <span id="pwd-result" class="text-xl sm:text-2xl font-mono tracking-widest font-bold break-all text-center sm:text-left w-full">Click Generate</span>
                        <button onclick="copyPwd()" class="w-full sm:w-auto p-3 bg-white dark:bg-slate-700 rounded-xl hover:text-blue-600 transition-colors shadow-sm flex justify-center items-center gap-2 border border-gray-200 dark:border-slate-600 font-medium">
                            <i class="ph ph-copy text-xl"></i> <span class="sm:hidden">Copy Password</span>
                        </button>
                    </div>
                    
                    <div class="space-y-5">
                        <div class="bg-gray-50 dark:bg-slate-800 p-4 rounded-xl border border-gray-100 dark:border-slate-700">
                            <label class="flex justify-between mb-3 font-medium"><span>Length</span> <span id="pwd-len-val" class="text-blue-600 font-bold bg-blue-100 dark:bg-blue-900/30 px-2 rounded">12</span></label>
                            <input type="range" id="pwd-length" min="6" max="32" value="12" class="w-full accent-blue-600 h-2 bg-gray-200 rounded-lg appearance-none cursor-pointer" oninput="document.getElementById('pwd-len-val').innerText = this.value; generatePwd()">
                        </div>
                        
                        <div class="grid grid-cols-1 sm:grid-cols-2 gap-3 sm:gap-4">
                            <label class="flex items-center gap-3 cursor-pointer bg-gray-50 dark:bg-slate-800 p-3.5 rounded-xl border border-gray-100 dark:border-slate-700 hover:border-blue-300 transition-colors">
                                <input type="checkbox" id="pwd-upper" checked class="w-5 h-5 accent-blue-600" onchange="generatePwd()"> 
                                <span class="font-medium">Uppercase (A-Z)</span>
                            </label>
                            <label class="flex items-center gap-3 cursor-pointer bg-gray-50 dark:bg-slate-800 p-3.5 rounded-xl border border-gray-100 dark:border-slate-700 hover:border-blue-300 transition-colors">
                                <input type="checkbox" id="pwd-lower" checked class="w-5 h-5 accent-blue-600" onchange="generatePwd()">

            `;
            generatePwd();
        }

        function generatePwd() {
            const length = document.getElementById('pwd-length').value;
            const hasUpper = document.getElementById('pwd-upper').checked;
            const hasLower = document.getElementById('pwd-lower').checked;
            const hasNum = document.getElementById('pwd-num').checked;
            const hasSym = document.getElementById('pwd-sym').checked;
            
            const upper = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
            const lower = 'abcdefghijklmnopqrstuvwxyz';
            const num = '0123456789';
            const sym = '!@#$%^&*()_+~|}{[]:;?><,./-=';
            
            let chars = '';
            if(hasUpper) chars += upper;
            if(hasLower) chars += lower;
            if(hasNum) chars += num;
            if(hasSym) chars += sym;
            
            if(!chars) {
                document.getElementById('pwd-result').innerText = 'Select options!';
                return;
            }
            
            let pwd = '';
            for(let i = 0; i < length; i++) {
                pwd += chars.charAt(Math.floor(Math.random() * chars.length));
            }
            document.getElementById('pwd-result').innerText = pwd;
        }

        function copyPwd() {
            const text = document.getElementById('pwd-result').innerText;
            if(text && text !== 'Select options!') {
                navigator.clipboard.writeText(text);
                
                // Show temporary toast inside button if possible, else alert fallback
                const btn = event.currentTarget;
                const originalHtml = btn.innerHTML;
                btn.innerHTML = '<i class="ph ph-check text-xl text-green-500"></i> <span class="sm:hidden text-green-500 font-bold">Copied!</span>';
                setTimeout(() => btn.innerHTML = originalHtml, 1500);
            }
        }

        function calculateAge() {
            const dobInput = document.getElementById('dob-input').value;
            if(!dobInput) return alert('Please select a valid date.');
            
            const dob = new Date(dobInput);
            const today = new Date();
            
            if(dob > today) return alert('Date of birth cannot be in the future!');
            
            let years = today.getFullYear() - dob.getFullYear();
            let months = today.getMonth() - dob.getMonth();
            let days = today.getDate() - dob.getDate();
            
            if (days < 0) {
                months--;
                const lastMonth = new Date(today.getFullYear(), today.getMonth(), 0);
                days += lastMonth.getDate();
            }
            if (months < 0) {
                years--;
                months += 12;
            }
            
            document.getElementById('age-y').innerText = years;
            document.getElementById('age-m').innerText = months;
            document.getElementById('age-d').innerText = days;
            document.getElementById('age-result').classList.remove('hidden');
        }

        function calcPress(key) {
            const display = document.getElementById('calc-display');
            if(key === 'C') window.calcStr = '0';
            else if(key === 'DEL') window.calcStr = window.calcStr.length > 1 ? window.calcStr.slice(0, -1) : '0';
            else if(key === '=') {
                try {
                    const result = new Function('return ' + window.calcStr)();
                    window.calcStr = String(Math.round(result * 100000000) / 100000000); 
                } catch(e) { window.calcStr = 'Error'; }
            }
            else {
                if(window.calcStr === '0' || window.calcStr === 'Error') window.calcStr = key;
                else window.calcStr += key;
            }
            display.innerText = window.calcStr.length > 12 ? window.calcStr.substring(0, 12) : window.calcStr;
        }

        function calcProfitLoss() {
            const cp = parseFloat(document.getElementById('pl-cp').value);
            const sp = parseFloat(document.getElementById('pl-sp').value);
            if(isNaN(cp) || isNaN(sp) || cp < 0 || sp < 0) return alert('Enter valid positive numbers.');

            const resultBox = document.getElementById('pl-result');
            const status = document.getElementById('pl-status');
            
            resultBox.classList.remove('hidden', 'bg-green-50', 'border-green-200', 'bg-red-50', 'border-red-200', 'bg-gray-50', 'border-gray-200');
            
            if (sp > cp) {
                const profit = sp - cp;
                const percent = ((profit / cp) * 100).toFixed(2);
                status.innerText = "PROFIT 🎉";
                status.className = "text-3xl font-black mb-3 tracking-wide text-green-600";
                resultBox.classList.add('bg-green-50', 'border-green-200', 'dark:bg-green-900/20', 'dark:border-green-900');
                document.getElementById('pl-amount').innerText = '$' + profit.toFixed(2);
                document.getElementById('pl-percent').innerText = percent;
            } else if (cp > sp) {
                const loss = cp - sp;
                const percent = ((loss / cp) * 100).toFixed(2);
                status.innerText = "LOSS 📉";
                status.className = "text-3xl font-black mb-3 tracking-wide text-red-600";
                resultBox.classList.add('bg-red-50', 'border-red-200', 'dark:bg-red-900/20', 'dark:border-red-900');
                document.getElementById('pl-amount').innerText = '$' + loss.toFixed(2);
                document.getElementById('pl-percent').innerText = percent;
            } else {
                status.innerText = "BREAK EVEN ⚖️";
                status.className = "text-3xl font-black mb-3 tracking-wide text-gray-600 dark:text-gray-400";
                resultBox.classList.add('bg-gray-50', 'border-gray-200', 'dark:bg-slate-800');
                document.getElementById('pl-amount').innerText = '$0.00';
                document.getElementById('pl-percent').innerText = '0.00';
            }
        }

        function calculateMarks() {
            const rows = document.querySelectorAll('.marks-row');
            let totalMax = 0;
            let totalObt = 0;
            let printTbody = '';
            
            rows.forEach(row => {
                const subj = row.querySelector('.marks-subj').value || 'Unnamed Subject';
                const maxInp = parseFloat(row.querySelector('.marks-max').value);
                const obtInp = parseFloat(row.querySelector('.marks-obt').value);
                
                if(!isNaN(maxInp) && !isNaN(obtInp)) {
                    totalMax += maxInp;
                    totalObt += obtInp;
                    
                    printTbody += `
                        <tr class="border-b border-gray-100">
                            <td class="p-3 text-gray-800 font-medium">${subj}</td>
                            <td class="p-3 text-center text-gray-600">${maxInp}</td>
                            <td class="p-3 text-right font-bold text-gray-800">${obtInp}</td>
                        </tr>
                    `;
                }
            });
            
            if(totalMax === 0) return alert("Please enter valid marks.");
            if(totalObt > totalMax) return alert("Obtained marks cannot be greater than Total marks.");
            
            const percent = (totalObt / totalMax) * 100;
            let grade = "F";
            let remarkMsg = "";
            
            if (percent >= 80) { grade = "A+"; remarkMsg = "Outstanding performance! You are brilliant! 🎉"; }
            else if (percent >= 70) { grade = "A"; remarkMsg = "Excellent work! Keep it up! 🌟"; }
            else if (percent >= 60) { grade = "A-"; remarkMsg = "Very good! You're doing great! 👍"; }
            else if (percent >= 50) { grade = "B"; remarkMsg = "Good job! Effort can make it better! 💪"; }
            else if (percent >= 40) { grade = "C"; remarkMsg = "Fair performance. You can improve! 📚"; }
            else if (percent >= 33) { grade = "D"; remarkMsg = "You passed, but need to work harder! 🧗"; }
            else { remarkMsg = "Don't give up! Failures are the pillars of success! ❤️"; }

            // Update UI
            document.getElementById('marks-obtained').innerText = totalObt;
            document.getElementById('marks-max').innerText = totalMax;
            document.getElementById('marks-percent').innerText = percent.toFixed(2);
            document.getElementById('marks-grade').innerText = grade;
            
            // Update Print Area
            document.getElementById('marks-print-tbody').innerHTML = printTbody;
            document.getElementById('marks-print-total-score').innerText = `${totalObt} / ${totalMax}`;
            document.getElementById('marks-print-percent-score').innerText = percent.toFixed(2);
            document.getElementById('marks-print-final-grade').innerText = grade;
            document.getElementById('marks-print-message').innerText = remarkMsg;
            
            document.getElementById('marks-result-box').classList.remove('hidden');
            
            // Scroll down a bit on mobile to show results
            if(window.innerWidth < 640) {
                 setTimeout(() => window.scrollBy({ top: 300, behavior: 'smooth' }), 100);
            }
        }

        function addMoneyTransaction() {
            const desc = document.getElementById('mt-desc').value.trim();
            const amount = parseFloat(document.getElementById('mt-amount').value);
            const type = document.getElementById('mt-type').value;
            
            if(!desc) return alert("Please enter a description.");
            if(isNaN(amount) || amount <= 0) return alert("Please enter a valid amount.");
            
            const data = JSON.parse(localStorage.getItem('dailyos_money') || '[]');
            const now = new Date();
            
            data.unshift({
                desc: desc,
                amount: amount,
                type: type,
                date: now.toLocaleDateString() + ' ' + now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
            });
            
            localStorage.setItem('dailyos_money', JSON.stringify(data));
            
            document.getElementById('mt-desc').value = '';
            document.getElementById('mt-amount').value = '';
            document.getElementById('mt-desc').focus();
            
            loadMoneyTransactions();
        }

        function deleteMoneyTransaction(index) {
            if(!confirm("Delete this transaction?")) return;
            const data = JSON.parse(localStorage.getItem('dailyos_money') || '[]');
            data.splice(index, 1);
            localStorage.setItem('dailyos_money', JSON.stringify(data));
            loadMoneyTransactions();
        }

        function clearMoneyTransactions() {
            if(!confirm("Are you sure you want to delete ALL transactions? This cannot be undone.")) return;
            localStorage.removeItem('dailyos_money');
            loadMoneyTransactions();
        }

        function downloadMoneyPDF() {
            const btn = document.getElementById('btn-dl-money');
            const originalText = btn.innerHTML;
            btn.innerHTML = '<i class="ph ph-spinner-gap animate-spin text-xl"></i> Downloading...';
            
            if (typeof window.html2pdf === 'undefined') {
                const script = document.createElement('script');
                script.src = 'https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js';
                script.onload = () => generateMoneyPDF(btn, originalText);
                document.head.appendChild(script);
            } else {
                generateMoneyPDF(btn, originalText);
            }
        }

        function generateMoneyPDF(btn, originalText) {
            const printArea = document.getElementById('mt-print-area');
            const uiArea = document.getElementById('mt-ui-area'); 
            
            window.scrollTo(0, 0);
            uiArea.style.display = 'none';
            printArea.classList.remove('hidden');
            printArea.classList.add('flex');
            
            const opt = {
                margin:       0.5,
                filename:     `Financial_Report_${new Date().getTime()}.pdf`,
                image:        { type: 'jpeg', quality: 0.98 },
                html2canvas:  { scale: 2, useCORS: true },
                jsPDF:        { unit: 'in', format: 'a4', orientation: 'portrait' }
            };

            setTimeout(() => {
                html2pdf().set(opt).from(printArea).save().then(() => {
                    uiArea.style.display = '';
                    printArea.classList.remove('flex');
                    printArea.classList.add('hidden');
                    btn.innerHTML = originalText;
                }).catch(err => {
                    console.error("PDF generation error: ", err);
                    btn.innerHTML = "Error!";
                    uiArea.style.display = '';
                    printArea.classList.remove('flex');
                    printArea.classList.add('hidden');
                    setTimeout(() => btn.innerHTML = originalText, 2000);
                });
            }, 300);
        }

        function calculateGPA() {
            const rows = document.querySelectorAll('.gpa-row');
            let totalCredits = 0;
            let totalPoints = 0;
            
            rows.forEach(row => {
                const creditInput = row.querySelector('.gpa-credit').value;
                const gradeInput = row.querySelector('.gpa-grade').value;
                
                if(creditInput && gradeInput !== '') {
                    const credit = parseFloat(creditInput);
                    const grade = parseFloat(gradeInput);
                    
                    if(!isNaN(credit) && !isNaN(grade)) {
                        totalCredits += credit;
                        totalPoints += (credit * grade);
                    }
                }
            });
            
            if(totalCredits === 0) {
                alert("Please enter credits and select grades to calculate your GPA.");
                return;
            }
            
            const gpa = totalPoints / totalCredits;
            document.getElementById('gpa-score').innerText = gpa.toFixed(2);
            document.getElementById('gpa-result-box').classList.remove('hidden');
            
            if(window.innerWidth < 640) {
                 setTimeout(() => window.scrollBy({ top: 300, behavior: 'smooth' }), 100);
            }
        }

                        </div>
                    </div>
                </div>
            `;
            window.unitData = {
                length: { m: 1, km: 1000, cm: 0.01, mi: 1609.34, ft: 0.3048, in: 0.0254 },
                weight: { kg: 1000, g: 1, lb: 453.592, oz: 28.3495 },
                temp: { C: 'C', F: 'F', K: 'K' } 
            };
            window.unitNames = {
                length: { m: 'Meter', km: 'Kilometer', cm: 'Centimeter', mi: 'Mile', ft: 'Foot', in: 'Inch' },
                weight: { kg: 'Kilogram', g: 'Gram', lb: 'Pound', oz: 'Ounce' },
                temp: { C: 'Celsius', F: 'Fahrenheit', K: 'Kelvin' }
            };
            setUnitCategory('length');
        }

        function setUnitCategory(cat) {
            window.currentUnitCat = cat;
            ['length', 'weight', 'temp'].forEach(c => {
                const btn = document.getElementById(`btn-${c}`);
                if(c === cat) btn.className = "flex-1 sm:flex-none px-4 py-2.5 rounded-lg bg-blue-600 text-white font-bold shadow-sm transition-colors text-sm sm:text-base";
                else btn.className = "flex-1 sm:flex-none px-4 py-2.5 rounded-lg bg-transparent hover:bg-gray-200 dark:hover:bg-slate-700 text-gray-700 dark:text-gray-300 font-medium transition-colors text-sm sm:text-base";
            });
            
            const select1 = document.getElementById('unit-type-1');
            const select2 = document.getElementById('unit-type-2');
            select1.innerHTML = ''; select2.innerHTML = '';
            
            for(let key in window.unitNames[cat]) {
                select1.innerHTML += `<option value="${key}">${window.unitNames[cat][key]}</option>`;
                select2.innerHTML += `<option value="${key}">${window.unitNames[cat][key]}</option>`;
            }
            
            const keys = Object.keys(window.unitNames[cat]);
            select1.value = keys[0];
            select2.value = keys[1] || keys[0];
            
            document.getElementById('unit-val-1').value = '';
            document.getElementById('unit-val-2').value = '';
        }

        function convertUnit(sourceIndex) {
            const cat = window.currentUnitCat;
            const val1 = document.getElementById('unit-val-1');
            const val2 = document.getElementById('unit-val-2');
            const type1 = document.getElementById('unit-type-1').value;
            const type2 = document.getElementById('unit-type-2').value;
            
            let sourceVal = parseFloat(sourceIndex === 1 ? val1.value : val2.value);
            let targetEl = sourceIndex === 1 ? val2 : val1;
            let fromType = sourceIndex === 1 ? type1 : type2;
            let toType = sourceIndex === 1 ? type2 : type1;

            if(isNaN(sourceVal)) {
                targetEl.value = '';
                return;
            }

            let result = 0;
            if(cat === 'temp') {
                let celsius;
                if(fromType === 'C') celsius = sourceVal;
                else if(fromType === 'F') celsius = (sourceVal - 32) * 5/9;
                else if(fromType === 'K') celsius = sourceVal - 273.15;

                if(toType === 'C') result = celsius;
                else if(toType === 'F') result = (celsius * 9/5) + 32;
                else if(toType === 'K') result = celsius + 273.15;
            } else {
                const baseVal = sourceVal * window.unitData[cat][fromType];
                result = baseVal / window.unitData[cat][toType];
            }

            targetEl.value = Number(result.toFixed(6)).toString(); 
        }

                    btn.className = "flex-1 sm:flex-none px-3 sm:px-4 py-2.5 rounded-lg bg-green-600 text-white font-bold shadow-sm whitespace-nowrap text-sm sm:text-base transition-colors";
                } else {
                    btn.className = "flex-1 sm:flex-none px-3 sm:px-4 py-2.5 rounded-lg text-gray-600 dark:text-gray-300 hover:bg-gray-200 dark:hover:bg-slate-700 font-medium whitespace-nowrap text-sm sm:text-base transition-colors";
                }
            });
            
            const titles = { 'today': "Today's", '30': 'Last 30 Days', '60': 'Last 60 Days', '90': 'Last 90 Days' };
            document.getElementById('sales-period-text').innerText = `${titles[view]} Total Sales`;
            
            loadSales();
        }

        function loadSales() {
            const allSales = JSON.parse(localStorage.getItem('dailyos_sales') || '[]');
            const list = document.getElementById('sales-list');
            const printBody = document.getElementById('print-sales-tbody');
            let total = 0;
            
            list.innerHTML = '';
            printBody.innerHTML = '';
            
            const now = Date.now();
            const todayStr = new Date().toLocaleDateString();
            
            const filteredSales = allSales.filter(sale => {
                const saleDateStr = sale.date || todayStr; 
                const saleTimeMs = sale.timestamp || now;
                
                if (window.salesView === 'today') return saleDateStr === todayStr;
                
                const daysMap = { '30': 30, '60': 60, '90': 90 };
                const cutoff = now - (daysMap[window.salesView] * 24 * 60 * 60 * 1000);
                return saleTimeMs >= cutoff;
            });

            if(filteredSales.length === 0) {
                list.innerHTML = `<li class="p-8 text-center text-gray-500 dark:text-gray-400 font-medium">No sales recorded for this period.</li>`;
                printBody.innerHTML = `<tr><td colspan="3" class="p-4 text-center text-gray-500">No data found</td></tr>`;
            } else {
                filteredSales.forEach((sale, index) => {
                    total += sale.amount;
                    const dateDisplay = sale.date ? sale.date : 'Today';
                    
                    list.innerHTML += `
                        <li class="flex items-center justify-between p-3 sm:p-4 hover:bg-gray-50 dark:hover:bg-slate-700/50 transition-colors">
                            <div class="truncate mr-2">
                                <p class="font-bold text-gray-800 dark:text-gray-200 text-sm sm:text-base truncate">${sale.desc || 'Unnamed Item'}</p>
                                <p class="text-[10px] sm:text-xs text-gray-500 flex items-center gap-1 mt-0.5"><i class="ph ph-calendar"></i> ${dateDisplay} &nbsp; <i class="ph ph-clock"></i> ${sale.time}</p>
                            </div>
                            <div class="flex items-center gap-2 sm:gap-4 shrink-0">
                                <span class="font-bold text-base sm:text-lg text-green-600 dark:text-green-400">$${sale.amount.toFixed(2)}</span>
                                <button onclick="deleteSale(${allSales.indexOf(sale)})" class="text-gray-400 hover:text-red-500 hover:bg-red-50 dark:hover:bg-red-900/20 p-2 rounded-full transition-colors"><i class="ph ph-trash text-lg"></i></button>
                            </div>
                        </li>
                    `;

                    printBody.innerHTML += `
                        <tr class="border-b border-gray-100">
                            <td class="p-3 text-gray-600 text-sm">${dateDisplay} <span class="text-xs text-gray-400 ml-1">${sale.time}</span></td>
                            <td class="p-3 text-gray-800 font-medium">${sale.desc || 'Unnamed Item'}</td>
                            <td class="p-3 text-right font-bold text-green-700">$${sale.amount.toFixed(2)}</td>
                        </tr>
                    `;
                });
            }
            
            const totalFixed = total.toFixed(2);
            document.getElementById('sales-total').innerText = totalFixed;
            document.getElementById('print-sales-total').innerText = totalFixed;
        }

        function addSale() {
            const descInput = document.getElementById('sale-desc');
            const amountInput = document.getElementById('sale-amount');
            const amount = parseFloat(amountInput.value);
            
            if(isNaN(amount) || amount <= 0) return alert('Enter a valid sales amount.');
            
            const sales = JSON.parse(localStorage.getItem('dailyos_sales') || '[]');
            const now = new Date();
            const time = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            const dateStr = now.toLocaleDateString();
            
            sales.unshift({ 
                desc: descInput.value.trim(), 
                amount: amount, 
                time: time,
                date: dateStr,
                timestamp: Date.now()
            });
            
            localStorage.setItem('dailyos_sales', JSON.stringify(sales));
            
            descInput.value = '';
            amountInput.value = '';
            descInput.focus();
            
            if(window.salesView !== 'today') {
                setSalesView('today');
            } else {
                loadSales();
            }
        }

        function deleteSale(actualIndex) {
            if(!confirm("Are you sure you want to remove this sale?")) return;
            const sales = JSON.parse(localStorage.getItem('dailyos_sales') || '[]');
            sales.splice(actualIndex, 1);
            localStorage.setItem('dailyos_sales', JSON.stringify(sales));
            loadSales();
        }

        function clearSales() {
            if(!confirm("Are you sure you want to clear ALL sales history? This cannot be undone.")) return;
            localStorage.removeItem('dailyos_sales');
            loadSales();
        }

        function downloadSalesPDF() {
            const btn = document.getElementById('btn-dl-sales');
            const originalText = btn.innerHTML;
            btn.innerHTML = '<i class="ph ph-spinner-gap animate-spin text-xl"></i> Downloading...';
            
            if (typeof window.html2pdf === 'undefined') {
                const script = document.createElement('script');
                script.src = 'https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js';
                script.onload = () => generateSalesPDF(btn, originalText);
                document.head.appendChild(script);
            } else {
                generateSalesPDF(btn, originalText);
            }
        }

        function generateSalesPDF(btn, originalText) {
            const printArea = document.getElementById('sales-print-area');
            const uiArea = document.getElementById('sales-ui-area'); 
            
            window.scrollTo(0, 0);
            uiArea.style.display = 'none';
            printArea.classList.remove('hidden');
            printArea.classList.add('flex');
            
            const opt = {
                margin:       0.5,
                filename:     `Sales_Report_${window.salesView}_Days.pdf`,
                image:        { type: 'jpeg', quality: 0.98 },
                html2canvas:  { scale: 2, useCORS: true },
                jsPDF:        { unit: 'in', format: 'a4', orientation: 'portrait' }
            };

            setTimeout(() => {
                html2pdf().set(opt).from(printArea).save().then(() => {
                    uiArea.style.display = '';
                    printArea.classList.remove('flex');
                    printArea.classList.add('hidden');
                    btn.innerHTML = originalText;
                }).catch(err => {
                    console.error("PDF generation error: ", err);
                    btn.innerHTML = "Error!";
                    uiArea.style.display = '';
                    printArea.classList.remove('flex');
                    printArea.classList.add('hidden');
                    setTimeout(() => btn.innerHTML = originalText, 2000);
                });
            }, 300);
        }

        // 14. Memory Game
        function renderMemoryGame(container) {
            container.innerHTML = `
                <div class="max-w-md mx-auto text-center">
                    <div class="bg-gray-50 dark:bg-slate-800 p-4 rounded-2xl border border-gray-200 dark:border-slate-700 mb-6 flex justify-between items-center px-6 shadow-sm">
                        <span class="font-bold text-gray-500 uppercase tracking-wide text-sm">Moves</span>
                        <span id="mem-moves" class="text-3xl font-black text-blue-600">0</span>
                    </div>
                    <div id="mem-grid" class="grid grid-cols-4 gap-2 sm:gap-3 perspective-1000 mb-6 max-w-[320px] mx-auto sm:max-w-none"></div>
                    <button onclick="initMemoryGame()" class="w-full bg-blue-600 text-white py-4 rounded-xl font-bold hover:bg-blue-700 transition-colors shadow-md text-lg">Restart Game</button>
                </div>
            `;
            initMemoryGame();
        }

        function initMemoryGame() {
            const grid = document.getElementById('mem-grid');
            grid.innerHTML = '';
            document.getElementById('mem-moves').innerText = '0';
            
            const emojis = ['🚀', '🌟', '🍕', '🎸', '🎮', '🧩', '🎨', '🎲'];
            let cards = [...emojis, ...emojis].sort(() => Math.random() - 0.5);
            
            window.memState = { moves: 0, flipped: [], matched: 0 };
            
            cards.forEach((emoji, index) => {
                const card = document.createElement('div');
                card.className = 'memory-card relative w-full aspect-square cursor-pointer active:scale-95 transition-transform';
                card.dataset.val = emoji;
                card.innerHTML = `
                    <div class="memory-card-front shadow-sm border border-gray-200 dark:border-slate-600 rounded-xl text-3xl sm:text-4xl">${emoji}</div>
                    <div class="memory-card-back shadow-sm flex items-center justify-center rounded-xl bg-blue-500"><i class="ph ph-question text-3xl sm:text-4xl text-white"></i></div>
                `;
                card.onclick = () => flipCard(card);
                grid.appendChild(card);
            });
        }

        function flipCard(card) {
            if(window.memState.flipped.length >= 2 || card.classList.contains('flipped')) return;
            
            card.classList.add('flipped');
            window.memState.flipped.push(card);
            
            if(window.memState.flipped.length === 2) {
                window.memState.moves++;
                document.getElementById('mem-moves').innerText = window.memState.moves;
                
                const [c1, c2] = window.memState.flipped;
                if(c1.dataset.val === c2.dataset.val) {
                    window.memState.matched += 2;
                    window.memState.flipped = [];
                    if(window.memState.matched === 16) {
                        setTimeout(() => {
                            document.getElementById('mem-moves').innerHTML += ` <span class="text-sm text-green-500 block">You Won! 🎉</span>`;
                        }, 400);
                    }
                } else {
                    setTimeout(() => {
                        c1.classList.remove('flipped');
                        c2.classList.remove('flipped');
                        window.memState.flipped = [];
                    }, 1000);
                }
            }
        }

        // --- Initialization ---
        window.onload = () => {
            initTheme();
            buildDashboard();
        };

    </script>
</body>
