<!DOCTYPE html>
<html lang="en" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DailyOS | Digital Toolbox</title>
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#3b82f6',
                        darkBg: '#0f172a',
                        darkCard: '#1e293b'
                    }
                }
            }
        }
    </script>
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .dark ::-webkit-scrollbar-thumb { background: #475569; }
        
        /* Smooth Fade In */
        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Memory Game Styles */
        .memory-card { transition: transform 0.3s; transform-style: preserve-3d; }
        .memory-card.flipped { transform: rotateY(180deg); }
        .memory-card-front, .memory-card-back { backface-visibility: hidden; position: absolute; top:0; left:0; width:100%; height:100%; display:flex; justify-content:center; align-items:center; border-radius: 0.5rem; }
        .memory-card-front { transform: rotateY(180deg); background: white; font-size: 2rem; }
        .dark .memory-card-front { background: #334155; }
        .memory-card-back { background: #3b82f6; color: white; font-size: 1.5rem; }

        /* Print Media for Invoice */
        @media print {
            body * { visibility: hidden; }
            #tool-content, #tool-content * { visibility: visible; }
            #tool-content { position: absolute; left: 0; top: 0; width: 100%; }
            .no-print { display: none !important; }
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 dark:bg-darkBg dark:text-gray-100 transition-colors duration-300 min-h-screen flex flex-col font-sans">

    <!-- Navigation -->
    <nav class="sticky top-0 z-50 bg-white/80 dark:bg-darkCard/80 backdrop-blur-md border-b border-gray-200 dark:border-slate-700 shadow-sm">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <div class="flex items-center gap-2 cursor-pointer" onclick="goHome()">
                    <div class="bg-blue-600 text-white p-2 rounded-lg">
                        <i class="ph ph-toolbox text-xl"></i>
                    </div>
                    <span class="font-bold text-xl tracking-tight">Daily<span class="text-blue-600 dark:text-blue-400">OS</span></span>
                </div>
                <div class="flex items-center gap-4">
                    <button id="theme-toggle" class="p-2 rounded-full hover:bg-gray-100 dark:hover:bg-slate-700 transition-colors" onclick="toggleTheme()">
                        <i class="ph ph-moon text-xl dark:hidden"></i>
                        <i class="ph ph-sun text-xl hidden dark:block text-yellow-400"></i>
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content Area -->
    <main class="flex-grow max-w-7xl mx-auto w-full px-4 sm:px-6 lg:px-8 py-8 relative">
        
        <!-- Dashboard View -->
        <div id="dashboard-view" class="fade-in space-y-12">
            <!-- Dynamically populated by JS -->
        </div>

        <!-- Tool View -->
        <div id="tool-view" class="hidden fade-in">
            <div class="mb-6 flex items-center justify-between">
                <button onclick="goHome()" class="flex items-center gap-2 text-gray-600 dark:text-gray-300 hover:text-blue-600 dark:hover:text-blue-400 transition-colors font-medium no-print">
                    <i class="ph ph-arrow-left text-lg"></i> Back to Home
                </button>
                <h2 id="tool-title" class="text-2xl font-bold text-gray-800 dark:text-white flex items-center gap-2"></h2>
                <div class="w-24"></div> <!-- Spacer for centering -->
            </div>
            <div id="tool-content" class="bg-white dark:bg-darkCard rounded-2xl shadow-sm border border-gray-200 dark:border-slate-700 p-6 min-h-[60vh]">
                <!-- Tool content injected here -->
            </div>
        </div>

    </main>

    <!-- Footer -->
    <footer class="border-t border-gray-200 dark:border-slate-700 py-6 mt-auto">
        <div class="text-center text-sm text-gray-500 dark:text-gray-400">
            &copy; 2026 DailyOS Digital Toolbox. Powered by GLOWZY.
        </div>
    </footer>

    <!-- Core Logic & Tool Implementations -->
    <script>
        // --- System State & Theme ---
        const initTheme = () => {
            if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                document.documentElement.classList.add('dark');
            } else {
                document.documentElement.classList.remove('dark');
            }
        };
        
        const toggleTheme = () => {
            document.documentElement.classList.toggle('dark');
            localStorage.theme = document.documentElement.classList.contains('dark') ? 'dark' : 'light';
        };

        // --- Data Structure (Modular system for easy addition) ---
        const osData = [
            {
                category: "Student Tools",
                icon: "ph-student",
                color: "text-blue-500",
                bg: "bg-blue-50 dark:bg-blue-500/10",
                tools: [
                    { id: "calc", name: "Smart Calculator", icon: "ph-calculator", render: renderCalculator },
                    { id: "notes", name: "Notes Saver", icon: "ph-notepad", render: renderNotes },
                    { id: "gpa", name: "GPA Calculator", icon: "ph-graduation-cap", render: renderGPACalc },
                    { id: "unit", name: "Unit Converter", icon: "ph-arrows-left-right", render: renderUnitConverter }
                ]
            },
            {
                category: "Shopkeeper Tools",
                icon: "ph-storefront",
                color: "text-green-500",
                bg: "bg-green-50 dark:bg-green-500/10",
                tools: [
                    { id: "profit", name: "Profit/Loss Calc", icon: "ph-trend-up", render: renderProfitLoss },
                    { id: "invoice", name: "Simple Invoice", icon: "ph-receipt", render: renderInvoice },
                    { id: "sales", name: "Daily Sales", icon: "ph-coins", render: renderSales }
                ]
            },
            {
                category: "Teacher Tools",
                icon: "ph-chalkboard-teacher",
                color: "text-purple-500",
                bg: "bg-purple-50 dark:bg-purple-500/10",
                tools: [
                    { id: "picker", name: "Random Student", icon: "ph-users-three", render: renderStudentPicker },
                    { id: "marks", name: "Marks Calculator", icon: "ph-exam", render: renderMarksCalc }
                ]
            },
            {
                category: "For Everyone",
                icon: "ph-globe-hemisphere-west",
                color: "text-orange-500",
                bg: "bg-orange-50 dark:bg-orange-500/10",
                tools: [
                    { id: "todo", name: "To-Do List", icon: "ph-check-square-offset", render: renderTodo },
                    { id: "money", name: "Money Tracker", icon: "ph-wallet", render: renderMoneyTracker },
                    { id: "pwd", name: "Password Gen", icon: "ph-password", render: renderPasswordGen },
                    { id: "age", name: "Age Calculator", icon: "ph-calendar", render: renderAgeCalc },
                    { id: "memory", name: "Memory Game", icon: "ph-puzzle-piece", render: renderMemoryGame }
                ]
            }
        ];

        // --- Core Navigation ---
        
        function buildDashboard() {
            const dashboardView = document.getElementById('dashboard-view');
            dashboardView.innerHTML = '';
            
            // Welcome Header
            const header = document.createElement('div');
            header.className = 'text-center mb-10';
            header.innerHTML = `
                <h1 class="text-4xl font-extrabold text-gray-900 dark:text-white mb-3">Your Digital Toolbox</h1>
                <p class="text-lg text-gray-600 dark:text-gray-400">Everything you need, instantly available in your browser.</p>
            `;
            dashboardView.appendChild(header);

            // Categories
            osData.forEach(cat => {
                const section = document.createElement('div');
                section.className = 'mb-10';
                
                const catHeader = document.createElement('h2');
                catHeader.className = 'text-2xl font-bold mb-5 flex items-center gap-2 text-gray-800 dark:text-gray-100';
                catHeader.innerHTML = `<i class="ph ${cat.icon} ${cat.color} p-2 rounded-lg ${cat.bg}"></i> ${cat.category}`;
                
                const grid = document.createElement('div');
                grid.className = 'grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4';

                cat.tools.forEach(tool => {
                    const card = document.createElement('div');
                    card.className = 'bg-white dark:bg-darkCard rounded-xl p-5 shadow-sm hover:shadow-md border border-gray-200 dark:border-slate-700 cursor-pointer transition-all duration-200 hover:-translate-y-1 flex flex-col items-center justify-center text-center gap-3 group';
                    card.onclick = () => openTool(tool);
                    
                    card.innerHTML = `
                        <div class="text-4xl text-gray-400 group-hover:${cat.color} transition-colors">
                            <i class="ph ${tool.icon}"></i>
                        </div>
                        <h3 class="font-semibold text-sm md:text-base">${tool.name}</h3>
                    `;
                    grid.appendChild(card);
                });

                section.appendChild(catHeader);
                section.appendChild(grid);
                dashboardView.appendChild(section);
            });
        }

        function openTool(tool) {
            document.getElementById('dashboard-view').classList.add('hidden');
            document.getElementById('tool-view').classList.remove('hidden');
            document.getElementById('tool-title').innerHTML = `<i class="ph ${tool.icon}"></i> ${tool.name}`;
            
            const toolContent = document.getElementById('tool-content');
            toolContent.innerHTML = ''; // Clear previous
            tool.render(toolContent);
            window.scrollTo(0, 0);
        }

        function goHome() {
            document.getElementById('tool-view').classList.add('hidden');
            document.getElementById('dashboard-view').classList.remove('hidden');
            document.getElementById('tool-content').innerHTML = ''; 
        }

        // ==========================================
        // TOOL IMPLEMENTATIONS (The "Apps")
        // ==========================================

        // 1. Notes Saver
        function renderNotes(container) {
            const saved = localStorage.getItem('dailyos_notes') || '';
            container.innerHTML = `
                <div class="flex flex-col h-full gap-4">
                    <p class="text-sm text-gray-500">Your notes are saved automatically to your device.</p>
                    <textarea id="note-area" class="w-full flex-grow min-h-[400px] p-4 rounded-xl border border-gray-300 dark:border-slate-600 bg-gray-50 dark:bg-slate-800 focus:ring-2 focus:ring-blue-500 outline-none resize-none transition-colors" placeholder="Type your notes here...">${saved}</textarea>
                    <button onclick="document.getElementById('note-area').value=''; localStorage.removeItem('dailyos_notes')" class="self-end px-4 py-2 text-red-600 hover:bg-red-50 dark:hover:bg-red-900/20 rounded-lg transition-colors">Clear Notes</button>
                </div>
            `;
            document.getElementById('note-area').addEventListener('input', (e) => {
                localStorage.setItem('dailyos_notes', e.target.value);
            });
        }

        // 2. To-Do List
        function renderTodo(container) {
            container.innerHTML = `
                <div class="max-w-2xl mx-auto">
                    <div class="flex gap-2 mb-6">
                        <input type="text" id="todo-input" class="flex-grow p-3 rounded-lg border border-gray-300 dark:border-slate-600 bg-transparent focus:ring-2 focus:ring-blue-500 outline-none" placeholder="Add a new task..." onkeypress="if(event.key === 'Enter') addTodo()">
                        <button onclick="addTodo()" class="bg-blue-600 text-white px-6 py-3 rounded-lg hover:bg-blue-700 transition-colors font-medium">Add</button>
                    </div>
                    <ul id="todo-list" class="space-y-3"></ul>
                </div>
            `;
            loadTodos();
        }
        
        function loadTodos() {
            const todos = JSON.parse(localStorage.getItem('dailyos_todos') || '[]');
            const list = document.getElementById('todo-list');
            list.innerHTML = '';
            todos.forEach((todo, index) => {
                list.innerHTML += `
                    <li class="flex items-center justify-between p-4 bg-gray-50 dark:bg-slate-800 rounded-lg border border-gray-100 dark:border-slate-700">
                        <div class="flex items-center gap-3 cursor-pointer" onclick="toggleTodo(${index})">
                            <div class="w-6 h-6 rounded-full border-2 flex items-center justify-center ${todo.done ? 'bg-green-500 border-green-500' : 'border-gray-400'}">
                                ${todo.done ? '<i class="ph ph-check text-white text-sm"></i>' : ''}
                            </div>
                            <span class="${todo.done ? 'line-through text-gray-400' : 'text-gray-800 dark:text-gray-100'}">${todo.text}</span>
                        </div>
                        <button onclick="deleteTodo(${index})" class="text-red-500 hover:text-red-700 p-2"><i class="ph ph-trash"></i></button>
                    </li>
                `;
            });
        }

        function addTodo() {
            const input = document.getElementById('todo-input');
            const text = input.value.trim();
            if(!text) return;
            const todos = JSON.parse(localStorage.getItem('dailyos_todos') || '[]');
            todos.push({ text, done: false });
            localStorage.setItem('dailyos_todos', JSON.stringify(todos));
            input.value = '';
            loadTodos();
        }

        function toggleTodo(index) {
            const todos = JSON.parse(localStorage.getItem('dailyos_todos') || '[]');
            todos[index].done = !todos[index].done;
            localStorage.setItem('dailyos_todos', JSON.stringify(todos));
            loadTodos();
        }

        function deleteTodo(index) {
            const todos = JSON.parse(localStorage.getItem('dailyos_todos') || '[]');
            todos.splice(index, 1);
            localStorage.setItem('dailyos_todos', JSON.stringify(todos));
            loadTodos();
        }

        // 3. Password Generator
        function renderPasswordGen(container) {
            container.innerHTML = `
                <div class="max-w-xl mx-auto space-y-6">
                    <div class="p-6 bg-gray-100 dark:bg-slate-800 rounded-xl flex justify-between items-center break-all">
                        <span id="pwd-result" class="text-2xl font-mono tracking-wider font-bold">Click Generate</span>
                        <button onclick="copyPwd()" class="ml-4 p-3 bg-white dark:bg-slate-700 rounded-lg hover:text-blue-500 transition-colors shadow-sm"><i class="ph ph-copy text-xl"></i></button>
                    </div>
                    
                    <div class="space-y-4">
                        <div>
                            <label class="flex justify-between mb-2"><span>Password Length:</span> <span id="pwd-len-val">12</span></label>
                            <input type="range" id="pwd-length" min="6" max="32" value="12" class="w-full accent-blue-600" oninput="document.getElementById('pwd-len-val').innerText = this.value; generatePwd()">
                        </div>
                        
                        <div class="grid grid-cols-2 gap-4">
                            <label class="flex items-center gap-2 cursor-pointer"><input type="checkbox" id="pwd-upper" checked class="w-5 h-5 accent-blue-600" onchange="generatePwd()"> Uppercase</label>
                            <label class="flex items-center gap-2 cursor-pointer"><input type="checkbox" id="pwd-lower" checked class="w-5 h-5 accent-blue-600" onchange="generatePwd()"> Lowercase</label>
                            <label class="flex items-center gap-2 cursor-pointer"><input type="checkbox" id="pwd-num" checked class="w-5 h-5 accent-blue-600" onchange="generatePwd()"> Numbers</label>
                            <label class="flex items-center gap-2 cursor-pointer"><input type="checkbox" id="pwd-sym" checked class="w-5 h-5 accent-blue-600" onchange="generatePwd()"> Symbols</label>
                        </div>
                    </div>
                    
                    <button onclick="generatePwd()" class="w-full bg-blue-600 text-white py-4 rounded-xl font-bold hover:bg-blue-700 transition-colors text-lg">Generate New Password</button>
                </div>
            `;
            generatePwd();
        }

        function generatePwd() {
            const length = document.getElementById('pwd-length').value;
            const hasUpper = document.getElementById('pwd-upper').checked;
            const hasLower = document.getElementById('pwd-lower').checked;
            const hasNum = document.getElementById('pwd-num').checked;
            const hasSym = document.getElementById('pwd-sym').checked;
            
            const upper = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
            const lower = 'abcdefghijklmnopqrstuvwxyz';
            const num = '0123456789';
            const sym = '!@#$%^&*()_+~|}{[]:;?><,./-=';
            
            let chars = '';
            if(hasUpper) chars += upper;
            if(hasLower) chars += lower;
            if(hasNum) chars += num;
            if(hasSym) chars += sym;
            
            if(!chars) {
                document.getElementById('pwd-result').innerText = 'Select options!';
                return;
            }
            
            let pwd = '';
            for(let i = 0; i < length; i++) {
                pwd += chars.charAt(Math.floor(Math.random() * chars.length));
            }
            document.getElementById('pwd-result').innerText = pwd;
        }

        function copyPwd() {
            const text = document.getElementById('pwd-result').innerText;
            if(text && text !== 'Select options!') {
                navigator.clipboard.writeText(text);
                alert('Password copied to clipboard!');
            }
        }

        // 4. Age Calculator
        function renderAgeCalc(container) {
            container.innerHTML = `
                <div class="max-w-md mx-auto text-center space-y-6">
                    <p class="text-gray-600 dark:text-gray-400">Select your date of birth to find your exact age.</p>
                    <input type="date" id="dob-input" class="w-full p-4 rounded-xl border border-gray-300 dark:border-slate-600 bg-transparent text-lg outline-none focus:ring-2 focus:ring-blue-500">
                    <button onclick="calculateAge()" class="w-full bg-blue-600 text-white py-4 rounded-xl font-bold hover:bg-blue-700 transition-colors">Calculate Age</button>
                    
                    <div id="age-result" class="hidden grid grid-cols-3 gap-4 pt-6 mt-6 border-t border-gray-200 dark:border-slate-700">
                        <div class="bg-blue-50 dark:bg-slate-800 p-4 rounded-xl"><div id="age-y" class="text-3xl font-bold text-blue-600">0</div><div class="text-sm">Years</div></div>
                        <div class="bg-blue-50 dark:bg-slate-800 p-4 rounded-xl"><div id="age-m" class="text-3xl font-bold text-blue-600">0</div><div class="text-sm">Months</div></div>
                        <div class="bg-blue-50 dark:bg-slate-800 p-4 rounded-xl"><div id="age-d" class="text-3xl font-bold text-blue-600">0</div><div class="text-sm">Days</div></div>
                    </div>
                </div>
            `;
        }

        function calculateAge() {
            const dobInput = document.getElementById('dob-input').value;
            if(!dobInput) return alert('Please select a date.');
            
            const dob = new Date(dobInput);
            const today = new Date();
            
            let years = today.getFullYear() - dob.getFullYear();
            let months = today.getMonth() - dob.getMonth();
            let days = today.getDate() - dob.getDate();
            
            if (days < 0) {
                months--;
                const lastMonth = new Date(today.getFullYear(), today.getMonth(), 0);
                days += lastMonth.getDate();
            }
            if (months < 0) {
                years--;
                months += 12;
            }
            
            document.getElementById('age-y').innerText = years;
            document.getElementById('age-m').innerText = months;
            document.getElementById('age-d').innerText = days;
            document.getElementById('age-result').classList.remove('hidden');
        }

        // 5. Smart Calculator
        function renderCalculator(container) {
            container.innerHTML = `
                <div class="max-w-xs mx-auto bg-gray-100 dark:bg-slate-800 p-6 rounded-3xl shadow-inner">
                    <div class="bg-white dark:bg-slate-900 h-20 rounded-xl mb-4 flex items-end justify-end p-4 shadow-sm border border-gray-200 dark:border-slate-700 overflow-hidden">
                        <span id="calc-display" class="text-3xl font-bold tracking-wider text-gray-800 dark:text-white">0</span>
                    </div>
                    <div class="grid grid-cols-4 gap-3">
                        <button onclick="calcPress('C')" class="col-span-2 p-4 bg-red-100 text-red-600 dark:bg-red-900/30 dark:text-red-400 rounded-xl font-bold hover:brightness-95">AC</button>
                        <button onclick="calcPress('DEL')" class="p-4 bg-gray-200 dark:bg-slate-700 rounded-xl font-bold hover:brightness-95">⌫</button>
                        <button onclick="calcPress('/')" class="p-4 bg-blue-100 text-blue-600 dark:bg-blue-900/30 dark:text-blue-400 rounded-xl font-bold hover:brightness-95">÷</button>
                        
                        <button onclick="calcPress('7')" class="p-4 bg-white dark:bg-slate-700 shadow-sm rounded-xl font-bold hover:brightness-95">7</button>
                        <button onclick="calcPress('8')" class="p-4 bg-white dark:bg-slate-700 shadow-sm rounded-xl font-bold hover:brightness-95">8</button>
                        <button onclick="calcPress('9')" class="p-4 bg-white dark:bg-slate-700 shadow-sm rounded-xl font-bold hover:brightness-95">9</button>
                        <button onclick="calcPress('*')" class="p-4 bg-blue-100 text-blue-600 dark:bg-blue-900/30 dark:text-blue-400 rounded-xl font-bold hover:brightness-95">×</button>
                        
                        <button onclick="calcPress('4')" class="p-4 bg-white dark:bg-slate-700 shadow-sm rounded-xl font-bold hover:brightness-95">4</button>
                        <button onclick="calcPress('5')" class="p-4 bg-white dark:bg-slate-700 shadow-sm rounded-xl font-bold hover:brightness-95">5</button>
                        <button onclick="calcPress('6')" class="p-4 bg-white dark:bg-slate-700 shadow-sm rounded-xl font-bold hover:brightness-95">6</button>
                        <button onclick="calcPress('-')" class="p-4 bg-blue-100 text-blue-600 dark:bg-blue-900/30 dark:text-blue-400 rounded-xl font-bold hover:brightness-95">-</button>
                        
                        <button onclick="calcPress('1')" class="p-4 bg-white dark:bg-slate-700 shadow-sm rounded-xl font-bold hover:brightness-95">1</button>
                        <button onclick="calcPress('2')" class="p-4 bg-white dark:bg-slate-700 shadow-sm rounded-xl font-bold hover:brightness-95">2</button>
                        <button onclick="calcPress('3')" class="p-4 bg-white dark:bg-slate-700 shadow-sm rounded-xl font-bold hover:brightness-95">3</button>
                        <button onclick="calcPress('+')" class="p-4 bg-blue-100 text-blue-600 dark:bg-blue-900/30 dark:text-blue-400 rounded-xl font-bold hover:brightness-95">+</button>
                        
                        <button onclick="calcPress('0')" class="col-span-2 p-4 bg-white dark:bg-slate-700 shadow-sm rounded-xl font-bold hover:brightness-95">0</button>
                        <button onclick="calcPress('.')" class="p-4 bg-white dark:bg-slate-700 shadow-sm rounded-xl font-bold hover:brightness-95">.</button>
                        <button onclick="calcPress('=')" class="p-4 bg-blue-600 text-white rounded-xl font-bold hover:brightness-95 shadow-md">=</button>
                    </div>
                </div>
            `;
            window.calcStr = '0';
        }

        function calcPress(key) {
            const display = document.getElementById('calc-display');
            if(key === 'C') window.calcStr = '0';
            else if(key === 'DEL') window.calcStr = window.calcStr.length > 1 ? window.calcStr.slice(0, -1) : '0';
            else if(key === '=') {
                try {
                    // Safe evaluation using Function
                    const result = new Function('return ' + window.calcStr)();
                    window.calcStr = String(Math.round(result * 100000000) / 100000000); // fix floating issues
                } catch(e) { window.calcStr = 'Error'; }
            }
            else {
                if(window.calcStr === '0' || window.calcStr === 'Error') window.calcStr = key;
                else window.calcStr += key;
            }
            display.innerText = window.calcStr;
        }

        // 6. Random Student Picker
        function renderStudentPicker(container) {
            container.innerHTML = `
                <div class="max-w-xl mx-auto space-y-6 text-center">
                    <p class="text-gray-600 dark:text-gray-400">Enter names separated by commas or new lines.</p>
                    <textarea id="names-input" class="w-full h-40 p-4 rounded-xl border border-gray-300 dark:border-slate-600 bg-transparent outline-none focus:ring-2 focus:ring-purple-500" placeholder="John, Jane, Mark, Sarah..."></textarea>
                    <button onclick="pickRandom()" class="w-full bg-purple-600 text-white py-4 rounded-xl font-bold hover:bg-purple-700 transition-colors text-lg">Pick Random Name</button>

            // Animation effect
            resultBox.classList.remove('hidden');
            resultBox.classList.remove('scale-100', 'opacity-100');
            resultBox.classList.add('scale-90', 'opacity-0');
            
            let count = 0;
            const interval = setInterval(() => {
                nameEl.innerText = names[Math.floor(Math.random() * names.length)];
                count++;
                if(count > 15) {
                    clearInterval(interval);
                    const winner = names[Math.floor(Math.random() * names.length)];
                    nameEl.innerText = winner;
                    // Trigger pop animation
                    setTimeout(() => {
                        resultBox.classList.remove('scale-90', 'opacity-0');
                        resultBox.classList.add('scale-100', 'opacity-100');
                    }, 50);
                }

        function calcProfitLoss() {
            const cp = parseFloat(document.getElementById('pl-cp').value);
            const sp = parseFloat(document.getElementById('pl-sp').value);
            if(isNaN(cp) || isNaN(sp) || cp < 0 || sp < 0) return alert('Enter valid positive numbers.');

            const resultBox = document.getElementById('pl-result');
            const status = document.getElementById('pl-status');
            
            resultBox.classList.remove('hidden', 'bg-green-50', 'border-green-200', 'bg-red-50', 'border-red-200', 'bg-gray-50', 'border-gray-200');
            
            if (sp > cp) {
                const profit = sp - cp;
                const percent = ((profit / cp) * 100).toFixed(2);
                status.innerText = "PROFIT 🎉";
                status.className = "text-2xl font-bold mb-2 text-green-600";
                resultBox.classList.add('bg-green-50', 'border-green-200', 'dark:bg-green-900/20', 'dark:border-green-900');
                document.getElementById('pl-amount').innerText = '$' + profit.toFixed(2);
                document.getElementById('pl-percent').innerText = percent;
            } else if (cp > sp) {
                const loss = cp - sp;
                const percent = ((loss / cp) * 100).toFixed(2);
                status.innerText = "LOSS 📉";
                status.className = "text-2xl font-bold mb-2 text-red-600";
                resultBox.classList.add('bg-red-50', 'border-red-200', 'dark:bg-red-900/20', 'dark:border-red-900');
                document.getElementById('pl-amount').innerText = '$' + loss.toFixed(2);
                document.getElementById('pl-percent').innerText = percent;
            } else {
                status.innerText = "BREAK EVEN ⚖️";
                status.className = "text-2xl font-bold mb-2 text-gray-600 dark:text-gray-400";
                resultBox.classList.add('bg-gray-50', 'border-gray-200', 'dark:bg-slate-800');
                document.getElementById('pl-amount').innerText = '$0.00';
                document.getElementById('pl-percent').innerText = '0.00';
            }
        }

        function calculateMarks() {
            const rows = document.querySelectorAll('.marks-row');
            let totalMax = 0;
            let totalObt = 0;
            let printTbody = '';
            
            rows.forEach(row => {
                const subj = row.querySelector('.marks-subj').value || 'Unnamed Subject';
                const maxInp = parseFloat(row.querySelector('.marks-max').value);
                const obtInp = parseFloat(row.querySelector('.marks-obt').value);
                
                if(!isNaN(maxInp) && !isNaN(obtInp)) {
                    totalMax += maxInp;
                    totalObt += obtInp;
                    
                    printTbody += `
                        <tr class="border-b border-gray-100">
                            <td class="p-3 text-gray-800 font-medium">${subj}</td>
                            <td class="p-3 text-center text-gray-600">${maxInp}</td>
                            <td class="p-3 text-right font-bold text-gray-800">${obtInp}</td>
                        </tr>
                    `;
                }
            });
            
            if(totalMax === 0) return alert("Please enter valid marks.");
            if(totalObt > totalMax) return alert("Obtained marks cannot be greater than Total marks.");
            
            const percent = (totalObt / totalMax) * 100;
            let grade = "F";
            let remarkMsg = "";
            
            if (percent >= 80) { grade = "A+"; remarkMsg = "Outstanding performance! You are brilliant! 🎉"; }
            else if (percent >= 70) { grade = "A"; remarkMsg = "Excellent work! Keep it up! 🌟"; }
            else if (percent >= 60) { grade = "A-"; remarkMsg = "Very good! You're doing great! 👍"; }
            else if (percent >= 50) { grade = "B"; remarkMsg = "Good job! Effort can make it better! 💪"; }
            else if (percent >= 40) { grade = "C"; remarkMsg = "Fair performance. You can improve! 📚"; }
            else if (percent >= 33) { grade = "D"; remarkMsg = "You passed, but need to work harder! 🧗"; }
            else { remarkMsg = "Don't give up! Failures are the pillars of success! ❤️"; }

            // Update UI
            document.getElementById('marks-obtained').innerText = totalObt;
            document.getElementById('marks-max').innerText = totalMax;
            document.getElementById('marks-percent').innerText = percent.toFixed(2);
            document.getElementById('marks-grade').innerText = grade;
            
            // Update Print Area
            document.getElementById('marks-print-tbody').innerHTML = printTbody;
            document.getElementById('marks-print-total-score').innerText = `${totalObt} / ${totalMax}`;
            document.getElementById('marks-print-percent-score').innerText = percent.toFixed(2);
            document.getElementById('marks-print-final-grade').innerText = grade;
            document.getElementById('marks-print-message').innerText = remarkMsg;
            
            document.getElementById('marks-result-box').classList.remove('hidden');
        }

        function loadMoneyTransactions() {
            const data = JSON.parse(localStorage.getItem('dailyos_money') || '[]');
            const list = document.getElementById('mt-list');
            let income = 0;
            let expense = 0;
            let printTbody = '';
            
            list.innerHTML = '';
            
            if(data.length === 0) {
                list.innerHTML = `<li class="p-8 text-center text-gray-500 dark:text-gray-400">No transactions recorded yet.</li>`;
                printTbody = `<tr><td colspan="4" class="p-4 text-center text-gray-500">No transaction data available</td></tr>`;
            } else {
                data.forEach((item, index) => {
                    if(item.type === 'income') income += item.amount;
                    else expense += item.amount;
                    
                    const isIncome = item.type === 'income';
                    const iconClass = isIncome ? 'ph-arrow-down-left text-green-500 bg-green-100 dark:bg-green-900/30' : 'ph-arrow-up-right text-red-500 bg-red-100 dark:bg-red-900/30';
                    const amountColor = isIncome ? 'text-green-600 dark:text-green-400' : 'text-red-600 dark:text-red-400';
                    const amountPrintColor = isIncome ? 'text-green-600' : 'text-red-600';
                    const sign = isIncome ? '+' : '-';
                    
                    // UI List
                    list.innerHTML += `
                        <li class="flex items-center justify-between p-4 hover:bg-gray-50 dark:hover:bg-slate-700/50 transition-colors">
                            <div class="flex items-center gap-4">
                                <div class="w-10 h-10 rounded-full flex items-center justify-center ${iconClass}">
                                    <i class="ph ${iconClass.split(' ')[0]} text-xl"></i>
                                </div>
                                <div>
                                    <p class="font-bold text-gray-800 dark:text-gray-200">${item.desc}</p>
                                    <p class="text-xs text-gray-500 flex items-center gap-1 mt-0.5"><i class="ph ph-calendar-blank"></i> ${item.date}</p>
                                </div>
                            </div>
                            <div class="flex items-center gap-4">
                                <span class="font-bold text-lg ${amountColor}">${sign}$${item.amount.toFixed(2)}</span>
                                <button onclick="deleteMoneyTransaction(${index})" class="text-gray-400 hover:text-red-500 hover:bg-red-50 dark:hover:bg-red-900/20 p-2 rounded-full transition-colors"><i class="ph ph-trash text-lg"></i></button>
                            </div>
                        </li>
                    `;

                    // Print Table Row
                    printTbody += `
                        <tr class="border-b border-gray-100">
                            <td class="p-3 text-gray-600 text-sm">${item.date}</td>
                            <td class="p-3 text-gray-800 font-medium">${item.desc}</td>
                            <td class="p-3 text-center font-bold ${amountPrintColor}">${isIncome ? 'Income' : 'Expense'}</td>
                            <td class="p-3 text-right font-bold ${amountPrintColor}">${sign}$${item.amount.toFixed(2)}</td>
                        </tr>
                    `;
                });
            }
            
            const balance = income - expense;
            
            // Update UI
            document.getElementById('mt-income').innerText = income.toFixed(2);
            document.getElementById('mt-expense').innerText = expense.toFixed(2);
            document.getElementById('mt-balance').innerText = balance.toFixed(2);

            // Update Print Area
            document.getElementById('mt-print-tbody').innerHTML = printTbody;
            document.getElementById('mt-print-income').innerText = '+$' + income.toFixed(2);
            document.getElementById('mt-print-expense').innerText = '-$' + expense.toFixed(2);
            document.getElementById('mt-print-balance').innerText = '$' + balance.toFixed(2);
        }

        function addMoneyTransaction() {
            const desc = document.getElementById('mt-desc').value.trim();
            const amount = parseFloat(document.getElementById('mt-amount').value);
            const type = document.getElementById('mt-type').value;
            
            if(!desc) return alert("Please enter a description.");
            if(isNaN(amount) || amount <= 0) return alert("Please enter a valid amount.");
            
            const data = JSON.parse(localStorage.getItem('dailyos_money') || '[]');
            const now = new Date();
            
            data.unshift({
                desc: desc,
                amount: amount,
                type: type,
                date: now.toLocaleDateString() + ' ' + now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
            });
            
            localStorage.setItem('dailyos_money', JSON.stringify(data));
            
            document.getElementById('mt-desc').value = '';
            document.getElementById('mt-amount').value = '';
            document.getElementById('mt-desc').focus();
            
            loadMoneyTransactions();
        }

        function deleteMoneyTransaction(index) {
            if(!confirm("Delete this transaction?")) return;
            const data = JSON.parse(localStorage.getItem('dailyos_money') || '[]');
            data.splice(index, 1);
            localStorage.setItem('dailyos_money', JSON.stringify(data));
            loadMoneyTransactions();
        }

        function clearMoneyTransactions() {
            if(!confirm("Are you sure you want to delete ALL transactions? This cannot be undone.")) return;
            localStorage.removeItem('dailyos_money');
            loadMoneyTransactions();
        }

        function downloadMoneyPDF() {
            const btn = document.getElementById('btn-dl-money');
            const originalText = btn.innerHTML;
            btn.innerHTML = '<i class="ph ph-spinner-gap animate-spin"></i> Downloading...';
            
            if (typeof window.html2pdf === 'undefined') {
                const script = document.createElement('script');
                script.src = 'https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js';
                script.onload = () => generateMoneyPDF(btn, originalText);
                document.head.appendChild(script);
            } else {
                generateMoneyPDF(btn, originalText);
            }
        }

        function generateMoneyPDF(btn, originalText) {
            const printArea = document.getElementById('mt-print-area');
            const uiArea = document.getElementById('mt-ui-area'); 
            
            window.scrollTo(0, 0);
            uiArea.style.display = 'none';
            printArea.classList.remove('hidden');
            printArea.classList.add('flex');
            
            const opt = {
                margin:       0.5,
                filename:     `Financial_Report_${new Date().getTime()}.pdf`,
                image:        { type: 'jpeg', quality: 0.98 },
                html2canvas:  { scale: 2, useCORS: true },
                jsPDF:        { unit: 'in', format: 'a4', orientation: 'portrait' }
            };

            setTimeout(() => {
                html2pdf().set(opt).from(printArea).save().then(() => {
                    uiArea.style.display = '';
                    printArea.classList.remove('flex');
                    printArea.classList.add('hidden');
                    btn.innerHTML = originalText;
                }).catch(err => {
                    console.error("PDF generation error: ", err);
                    btn.innerHTML = "Error!";
                    uiArea.style.display = '';
                    printArea.classList.remove('flex');
                    printArea.classList.add('hidden');
                    setTimeout(() => btn.innerHTML = originalText, 2000);
                });
            }, 300);
        }

        function calculateGPA() {
            const rows = document.querySelectorAll('.gpa-row');
            let totalCredits = 0;
            let totalPoints = 0;
            
            rows.forEach(row => {
                const creditInput = row.querySelector('.gpa-credit').value;
                const gradeInput = row.querySelector('.gpa-grade').value;
                
                if(creditInput && gradeInput !== '') {
                    const credit = parseFloat(creditInput);
                    const grade = parseFloat(gradeInput);
                    
                    if(!isNaN(credit) && !isNaN(grade)) {
                        totalCredits += credit;
                        totalPoints += (credit * grade);
                    }
                }
            });
            
            if(totalCredits === 0) {
                alert("Please enter credits and select grades to calculate your GPA.");
                return;
            }
            
            const gpa = totalPoints / totalCredits;
            document.getElementById('gpa-score').innerText = gpa.toFixed(2);
            document.getElementById('gpa-result-box').classList.remove('hidden');
        }

                            <input type="number" id="unit-val-1" class="w-2/3 p-4 rounded-xl border border-gray-300 dark:border-slate-600 bg-white dark:bg-slate-700 outline-none focus:ring-2 focus:ring-blue-500 text-lg font-medium" placeholder="0" oninput="convertUnit(1)">
                            <select id="unit-type-1" class="w-1/3 p-4 rounded-xl border border-gray-300 dark:border-slate-600 bg-white dark:bg-slate-700 outline-none focus:ring-2 focus:ring-blue-500 cursor-pointer text-sm" onchange="convertUnit(1)"></select>

                        <div class="flex gap-2">
                            <input type="number" id="unit-val-2" class="w-2/3 p-4 rounded-xl border border-gray-300 dark:border-slate-600 bg-white dark:bg-slate-700 outline-none focus:ring-2 focus:ring-blue-500 text-lg font-medium" placeholder="0" oninput="convertUnit(2)">
                            <select id="unit-type-2" class="w-1/3 p-4 rounded-xl border border-gray-300 dark:border-slate-600 bg-white dark:bg-slate-700 outline-none focus:ring-2 focus:ring-blue-500 cursor-pointer text-sm" onchange="convertUnit(2)"></select>
                        </div>
                    </div>
                </div>
            `;
            window.unitData = {
                length: { m: 1, km: 1000, cm: 0.01, mi: 1609.34, ft: 0.3048, in: 0.0254 },
                weight: { kg: 1000, g: 1, lb: 453.592, oz: 28.3495 },
                temp: { C: 'C', F: 'F', K: 'K' } 
            };
            window.unitNames = {
                length: { m: 'Meter', km: 'Kilometer', cm: 'Centimeter', mi: 'Mile', ft: 'Foot', in: 'Inch' },
                weight: { kg: 'Kilogram', g: 'Gram', lb: 'Pound', oz: 'Ounce' },
                temp: { C: 'Celsius', F: 'Fahrenheit', K: 'Kelvin' }
            };
            setUnitCategory('length');
        }

        function setUnitCategory(cat) {
            window.currentUnitCat = cat;
            ['length', 'weight', 'temp'].forEach(c => {
                const btn = document.getElementById(`btn-${c}`);
                if(c === cat) btn.className = "px-4 py-2 rounded-lg bg-blue-600 text-white transition-colors font-medium shadow-sm";
                else btn.className = "px-4 py-2 rounded-lg bg-gray-200 text-gray-700 dark:bg-slate-700 dark:text-gray-300 hover:bg-gray-300 dark:hover:bg-slate-600 transition-colors font-medium";
            });
            
            const select1 = document.getElementById('unit-type-1');
            const select2 = document.getElementById('unit-type-2');
            select1.innerHTML = ''; select2.innerHTML = '';
            
            for(let key in window.unitNames[cat]) {
                select1.innerHTML += `<option value="${key}">${window.unitNames[cat][key]}</option>`;
                select2.innerHTML += `<option value="${key}">${window.unitNames[cat][key]}</option>`;
            }
            
            const keys = Object.keys(window.unitNames[cat]);
            select1.value = keys[0];
            select2.value = keys[1] || keys[0];
            
            document.getElementById('unit-val-1').value = '';
            document.getElementById('unit-val-2').value = '';
        }

        function convertUnit(sourceIndex) {
            const cat = window.currentUnitCat;
            const val1 = document.getElementById('unit-val-1');
            const val2 = document.getElementById('unit-val-2');
            const type1 = document.getElementById('unit-type-1').value;
            const type2 = document.getElementById('unit-type-2').value;
            
            let sourceVal = parseFloat(sourceIndex === 1 ? val1.value : val2.value);
            let targetEl = sourceIndex === 1 ? val2 : val1;
            let fromType = sourceIndex === 1 ? type1 : type2;
            let toType = sourceIndex === 1 ? type2 : type1;

            if(isNaN(sourceVal)) {
                targetEl.value = '';
                return;
            }

            let result = 0;
            if(cat === 'temp') {
                let celsius;
                if(fromType === 'C') celsius = sourceVal;
                else if(fromType === 'F') celsius = (sourceVal - 32) * 5/9;
                else if(fromType === 'K') celsius = sourceVal - 273.15;

                if(toType === 'C') result = celsius;
                else if(toType === 'F') result = (celsius * 9/5) + 32;
                else if(toType === 'K') result = celsius + 273.15;
            } else {
                const baseVal = sourceVal * window.unitData[cat][fromType];
                result = baseVal / window.unitData[cat][toType];
            }

            targetEl.value = Number(result.toFixed(6)).toString(); // fixes floating point weirdness
        }

                        <div class="flex flex-col sm:flex-row gap-3">
                            <input type="text" id="sale-desc" class="flex-grow p-4 rounded-xl border border-gray-300 dark:border-slate-600 bg-white dark:bg-slate-700 focus:ring-2 focus:ring-green-500 outline-none transition-colors" placeholder="Item description (e.g., Book)">
                            <input type="number" id="sale-amount" class="w-full sm:w-36 p-4 rounded-xl border border-gray-300 dark:border-slate-600 bg-white dark:bg-slate-700 focus:ring-2 focus:ring-green-500 outline-none transition-colors" placeholder="Amount ($)" onkeypress="if(event.key === 'Enter') addSale()">
                            <button onclick="addSale()" class="bg-green-600 text-white px-8 py-4 rounded-xl hover:bg-green-700 transition-colors font-bold whitespace-nowrap shadow-sm">Add Sale</button>
                        </div>
                        
                        <div>
                            <div class="flex justify-between items-center mb-3 px-2">
                                <span class="text-gray-600 dark:text-gray-300 font-bold">Transaction History</span>
                                <div class="flex gap-4">
                                    <button onclick="downloadSalesPDF()" id="btn-dl-sales" class="text-sm flex items-center gap-1 text-blue-600 dark:text-blue-400 hover:underline"><i class="ph ph-download-simple"></i> Download PDF</button>
                                    <button onclick="clearSales()" class="text-sm text-red-500 hover:text-red-700 hover:underline">Clear All</button>
                                </div>
                            </div>
                            <div class="bg-gray-50 dark:bg-slate-800 rounded-2xl border border-gray-200 dark:border-slate-700 overflow-hidden">
                                <ul id="sales-list" class="divide-y divide-gray-200 dark:divide-slate-700 max-h-[350px] overflow-y-auto">
                                </ul>
                            </div>
                        </div>
                    </div>

                    <div id="sales-print-area" class="hidden bg-white text-black p-8 rounded-xl min-h-[600px] flex-col relative">
                        <div class="border-b-2 border-gray-800 pb-4 mb-6">
                            <h1 class="text-3xl font-bold uppercase text-gray-800">Sales Report</h1>
                            <p class="text-gray-500 mt-1" id="print-report-date"></p>
                        </div>
                        <table class="w-full text-left mb-6 flex-grow">
                            <thead>
                                <tr class="border-b bg-gray-100">
                                    <th class="p-3">Date & Time</th>
                                    <th class="p-3">Description</th>
                                    <th class="p-3 text-right">Amount</th>
                                </tr>
                            </thead>
                            <tbody id="print-sales-tbody">
                            </tbody>
                        </table>
                        <div class="flex justify-end pt-4 border-t-2 border-gray-800 mt-4">
                            <div class="text-right">
                                <p class="text-gray-600 uppercase text-sm font-bold">Total Sales</p>
                                <p class="font-extrabold text-3xl">$<span id="print-sales-total">0.00</span></p>
                            </div>
                        </div>
                        <!-- Sponsor Message -->
                        <div class="mt-16 pt-4 border-t border-dashed border-gray-300 text-right w-full">
                            <p class="text-gray-400 text-sm font-bold tracking-wide">Sponsored by <span class="text-gray-800">GLOWZY, DailyOS</span></p>
                        </div>
                    </div>
                </div>
            `;
            loadSales();
        }

        function setSalesView(view) {
            window.salesView = view;
            const views = ['today', '30', '60', '90'];
            views.forEach(v => {
                const btn = document.getElementById(`sv-${v}`);
                if(v === view) {
                    btn.className = "px-4 py-2 rounded-lg bg-green-600 text-white font-medium shadow-sm whitespace-nowrap";
                } else {
                    btn.className = "px-4 py-2 rounded-lg text-gray-600 dark:text-gray-300 hover:bg-gray-200 dark:hover:bg-slate-700 transition-colors font-medium whitespace-nowrap";
                }
            });
            
            const titles = { 'today': "Today's", '30': 'Last 30 Days', '60': 'Last 60 Days', '90': 'Last 90 Days' };
            document.getElementById('sales-period-text').innerText = `${titles[view]} Total Sales`;
            
            loadSales();
        }

        function loadSales() {
            const allSales = JSON.parse(localStorage.getItem('dailyos_sales') || '[]');
            const list = document.getElementById('sales-list');
            const printBody = document.getElementById('print-sales-tbody');
            let total = 0;
            
            list.innerHTML = '';
            printBody.innerHTML = '';
            
            const now = Date.now();
            const todayStr = new Date().toLocaleDateString();
            
            const filteredSales = allSales.filter(sale => {
                const saleDateStr = sale.date || todayStr; 
                const saleTimeMs = sale.timestamp || now;
                
                if (window.salesView === 'today') return saleDateStr === todayStr;
                
                const daysMap = { '30': 30, '60': 60, '90': 90 };
                const cutoff = now - (daysMap[window.salesView] * 24 * 60 * 60 * 1000);
                return saleTimeMs >= cutoff;
            });

            if(filteredSales.length === 0) {
                list.innerHTML = `<li class="p-8 text-center text-gray-500 dark:text-gray-400">No sales recorded for this period.</li>`;
                printBody.innerHTML = `<tr><td colspan="3" class="p-4 text-center text-gray-500">No data found</td></tr>`;
            } else {
                filteredSales.forEach((sale, index) => {
                    total += sale.amount;
                    const dateDisplay = sale.date ? sale.date : 'Today';
                    
                    list.innerHTML += `
                        <li class="flex items-center justify-between p-4 hover:bg-gray-100 dark:hover:bg-slate-700/50 transition-colors">
                            <div>
                                <p class="font-bold text-gray-800 dark:text-gray-200">${sale.desc || 'Unnamed Item'}</p>
                                <p class="text-xs text-gray-500 flex items-center gap-1 mt-1"><i class="ph ph-calendar"></i> ${dateDisplay} &nbsp; <i class="ph ph-clock"></i> ${sale.time}</p>
                            </div>
                            <div class="flex items-center gap-4">
                                <span class="font-bold text-lg text-green-600 dark:text-green-400">$${sale.amount.toFixed(2)}</span>
                                <button onclick="deleteSale(${allSales.indexOf(sale)})" class="text-gray-400 hover:text-red-500 hover:bg-red-50 dark:hover:bg-red-900/20 p-2 rounded-full transition-colors"><i class="ph ph-trash text-lg"></i></button>
                            </div>
                        </li>
                    `;

                    printBody.innerHTML += `
                        <tr class="border-b">
                            <td class="p-3 text-sm">${dateDisplay} ${sale.time}</td>
                            <td class="p-3 text-sm">${sale.desc || 'Unnamed Item'}</td>
                            <td class="p-3 text-right font-medium">$${sale.amount.toFixed(2)}</td>
                        </tr>
                    `;
                });
            }
            
            const totalFixed = total.toFixed(2);
            document.getElementById('sales-total').innerText = totalFixed;
            document.getElementById('print-sales-total').innerText = totalFixed;
            
            const titles = { 'today': "Today's", '30': '30 Days', '60': '60 Days', '90': '90 Days' };
            document.getElementById('print-report-date').innerText = `Period: ${titles[window.salesView]} (Generated: ${new Date().toLocaleString()})`;
        }

        function addSale() {
            const descInput = document.getElementById('sale-desc');
            const amountInput = document.getElementById('sale-amount');
            const amount = parseFloat(amountInput.value);
            
            if(isNaN(amount) || amount <= 0) return alert('Enter a valid sales amount.');
            
            const sales = JSON.parse(localStorage.getItem('dailyos_sales') || '[]');
            const now = new Date();
            const time = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            const dateStr = now.toLocaleDateString();
            
            sales.unshift({ 
                desc: descInput.value.trim(), 
                amount: amount, 
                time: time,
                date: dateStr,
                timestamp: Date.now()
            });
            
            localStorage.setItem('dailyos_sales', JSON.stringify(sales));
            
            descInput.value = '';
            amountInput.value = '';
            descInput.focus();
            
            if(window.salesView !== 'today') {
                setSalesView('today');
            } else {
                loadSales();
            }
        }

        function deleteSale(actualIndex) {
            if(!confirm("Are you sure you want to remove this sale?")) return;
            const sales = JSON.parse(localStorage.getItem('dailyos_sales') || '[]');
            sales.splice(actualIndex, 1);
            localStorage.setItem('dailyos_sales', JSON.stringify(sales));
            loadSales();
        }

        function clearSales() {
            if(!confirm("Are you sure you want to clear ALL sales history? This cannot be undone.")) return;
            localStorage.removeItem('dailyos_sales');
            loadSales();
        }

        function downloadSalesPDF() {
            const btn = document.getElementById('btn-dl-sales');
            const originalText = btn.innerHTML;
            btn.innerHTML = '<i class="ph ph-spinner-gap animate-spin"></i> Downloading...';
            
            if (typeof window.html2pdf === 'undefined') {
                const script = document.createElement('script');
                script.src = 'https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js';
                script.onload = () => generateSalesPDF(btn, originalText);
                document.head.appendChild(script);
            } else {
                generateSalesPDF(btn, originalText);
            }
        }

        function generateSalesPDF(btn, originalText) {
            const printArea = document.getElementById('sales-print-area');
            const uiArea = document.getElementById('sales-ui-area'); 
            
            window.scrollTo(0, 0);
            uiArea.style.display = 'none';
            printArea.classList.remove('hidden');
            printArea.classList.add('flex');
            
            const opt = {
                margin:       0.5,
                filename:     `Sales_Report_${window.salesView}_Days.pdf`,
                image:        { type: 'jpeg', quality: 0.98 },
                html2canvas:  { scale: 2, useCORS: true },
                jsPDF:        { unit: 'in', format: 'a4', orientation: 'portrait' }
            };

            setTimeout(() => {
                html2pdf().set(opt).from(printArea).save().then(() => {
                    uiArea.style.display = '';
                    printArea.classList.remove('flex');
                    printArea.classList.add('hidden');
                    btn.innerHTML = originalText;
                }).catch(err => {
                    console.error("PDF generation error: ", err);
                    btn.innerHTML = "Error!";
                    uiArea.style.display = '';
                    printArea.classList.remove('flex');
                    printArea.classList.add('hidden');
                    setTimeout(() => btn.innerHTML = originalText, 2000);
                });
            }, 300);
        }

        // 14. Memory Game
        function renderMemoryGame(container) {
            container.innerHTML = `
                <div class="max-w-md mx-auto text-center">
                    <p class="mb-4">Match the pairs to win! Moves: <span id="mem-moves" class="font-bold">0</span></p>
                    <div id="mem-grid" class="grid grid-cols-4 gap-3 perspective-1000"></div>
                    <button onclick="initMemoryGame()" class="mt-8 px-6 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700">Restart Game</button>
                </div>
            `;
            initMemoryGame();
        }

        function initMemoryGame() {
            const grid = document.getElementById('mem-grid');
            grid.innerHTML = '';
            document.getElementById('mem-moves').innerText = '0';
            
            const emojis = ['🚀', '🌟', '🍕', '🎸', '🎮', '🧩', '🎨', '🎲'];
            let cards = [...emojis, ...emojis].sort(() => Math.random() - 0.5);
            
            window.memState = { moves: 0, flipped: [], matched: 0 };
            
            cards.forEach((emoji, index) => {
                const card = document.createElement('div');
                card.className = 'memory-card relative w-full aspect-square cursor-pointer';
                card.dataset.val = emoji;
                card.innerHTML = `
                    <div class="memory-card-front shadow-sm border border-gray-200 dark:border-slate-600">${emoji}</div>
                    <div class="memory-card-back shadow-sm flex items-center justify-center"><i class="ph ph-question text-3xl"></i></div>
                `;
                card.onclick = () => flipCard(card);
                grid.appendChild(card);
            });
        }

        function flipCard(card) {
            if(window.memState.flipped.length >= 2 || card.classList.contains('flipped')) return;
            
            card.classList.add('flipped');
            window.memState.flipped.push(card);
            
            if(window.memState.flipped.length === 2) {
                window.memState.moves++;
                document.getElementById('mem-moves').innerText = window.memState.moves;
                
                const [c1, c2] = window.memState.flipped;
                if(c1.dataset.val === c2.dataset.val) {
                    window.memState.matched += 2;
                    window.memState.flipped = [];
                    if(window.memState.matched === 16) setTimeout(() => alert(`You won in ${window.memState.moves} moves! 🎉`), 300);
                } else {
                    setTimeout(() => {
                        c1.classList.remove('flipped');
                        c2.classList.remove('flipped');
                        window.memState.flipped = [];
                    }, 1000);
                }
            }
        }

        // --- Initialization ---
        window.onload = () => {
            initTheme();
            buildDashboard();
        };

    </script>
</body>
