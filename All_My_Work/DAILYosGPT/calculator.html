<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart Calculator</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#0d131f] text-slate-300 font-sans selection:bg-blue-500/30 m-0 p-0 h-screen flex flex-col">

  <!-- Header -->
  <header class="flex justify-between items-center px-6 py-4 bg-[#0d131f] border-b border-slate-800/60">
    <div class="flex items-center gap-3">
      <div class="bg-blue-500 p-1.5 rounded-lg flex items-center justify-center">
        <!-- Briefcase Icon -->
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <rect width="20" height="14" x="2" y="7" rx="2" ry="2"></rect>
          <path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"></path>
        </svg>
      </div>
      <span class="text-white font-bold text-lg tracking-wide">DailyOS</span>
    </div>
    <button class="text-yellow-500 hover:text-yellow-400 transition-colors p-2 rounded-full hover:bg-slate-800/50">
      <!-- Sun Icon -->
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="4"></circle>
        <path d="M12 2v2"></path>
        <path d="M12 20v2"></path>
        <path d="m4.93 4.93 1.41 1.41"></path>
        <path d="m17.66 17.66 1.41 1.41"></path>
        <path d="M2 12h2"></path>
        <path d="M20 12h2"></path>
        <path d="m6.34 17.66-1.41 1.41"></path>
        <path d="m19.07 4.93-1.41 1.41"></path>
      </svg>
    </button>
  </header>

  <!-- Main Content -->
  <main class="flex-1 flex flex-col items-center justify-center p-4 sm:p-8">
    
    <!-- Top Action Bar -->
    <div class="w-full max-w-[1000px] relative flex justify-center items-center mb-8">
<a href="student.html" class="absolute left-0 flex items-center gap-2 text-slate-400 hover:text-white transition-colors text-sm font-medium">
    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="m12 19-7-7 7-7"></path>
      <path d="M19 12H5"></path>
    </svg>
    Back
  </a>
      
      <div class="flex items-center gap-3 text-white">
        <!-- Calculator Icon -->
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect width="16" height="20" x="4" y="2" rx="2"></rect>
          <line x1="8" x2="16" y1="6" y2="6"></line>
          <line x1="16" x2="16" y1="14" y2="18"></line>
          <path d="M16 10h.01"></path>
          <path d="M12 10h.01"></path>
          <path d="M8 10h.01"></path>
          <path d="M12 14h.01"></path>
          <path d="M8 14h.01"></path>
          <path d="M12 18h.01"></path>
          <path d="M8 18h.01"></path>
        </svg>
        <h1 class="text-2xl font-bold tracking-wide">Smart Calculator</h1>
      </div>
    </div>

    <!-- Large Outer Container -->
    <div class="bg-[#1a2332] w-full max-w-[1000px] rounded-[1.5rem] p-8 sm:p-16 shadow-2xl flex justify-center items-center min-h-[500px]">

      <!-- Calculator Device -->
      <div class="bg-[#131a26] p-5 rounded-3xl border border-[#2a3441] shadow-[0_10px_40px_-10px_rgba(0,0,0,0.5)] w-[320px]">
        
        <!-- Display Screen -->
        <div class="bg-[#080d15] h-24 rounded-2xl mb-5 flex items-center justify-end px-5 overflow-hidden border border-slate-800/50 shadow-inner">
          <span id="display" class="text-white text-5xl font-semibold tracking-wider tabular-nums truncate">
            0
          </span>
        </div>

        <!-- Keypad -->
        <div class="grid grid-cols-4 gap-3">
          
          <!-- Row 1 -->
          <button onclick="handleClear()" class="col-span-2 bg-[#3f1c24] hover:bg-[#4d242e] text-[#ec6767] rounded-xl py-4 font-semibold text-lg transition-colors shadow-sm">
            AC
          </button>
          <button onclick="handleDelete()" class="bg-[#283243] hover:bg-[#344053] text-white rounded-xl py-4 flex justify-center items-center transition-colors shadow-sm">
            <!-- Delete Icon -->
            <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M20 5H9l-7 7 7 7h11a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2Z"></path>
              <line x1="18" x2="12" y1="9" y2="15"></line>
              <line x1="12" x2="18" y1="9" y2="15"></line>
            </svg>
          </button>
          <button onclick="handleOperator('÷')" class="bg-[#283243] hover:bg-[#344053] text-[#4c84f5] rounded-xl py-4 font-semibold text-xl transition-colors shadow-sm flex items-center justify-center">÷</button>

          <!-- Row 2 -->
          <button onclick="handleNumber('7')" class="bg-[#283243] hover:bg-[#344053] text-white rounded-xl py-4 font-semibold text-lg transition-colors shadow-sm">7</button>
          <button onclick="handleNumber('8')" class="bg-[#283243] hover:bg-[#344053] text-white rounded-xl py-4 font-semibold text-lg transition-colors shadow-sm">8</button>
          <button onclick="handleNumber('9')" class="bg-[#283243] hover:bg-[#344053] text-white rounded-xl py-4 font-semibold text-lg transition-colors shadow-sm">9</button>
          <button onclick="handleOperator('×')" class="bg-[#283243] hover:bg-[#344053] text-[#4c84f5] rounded-xl py-4 font-semibold text-xl transition-colors shadow-sm flex items-center justify-center">×</button>

          <!-- Row 3 -->
          <button onclick="handleNumber('4')" class="bg-[#283243] hover:bg-[#344053] text-white rounded-xl py-4 font-semibold text-lg transition-colors shadow-sm">4</button>
          <button onclick="handleNumber('5')" class="bg-[#283243] hover:bg-[#344053] text-white rounded-xl py-4 font-semibold text-lg transition-colors shadow-sm">5</button>
          <button onclick="handleNumber('6')" class="bg-[#283243] hover:bg-[#344053] text-white rounded-xl py-4 font-semibold text-lg transition-colors shadow-sm">6</button>
          <button onclick="handleOperator('-')" class="bg-[#283243] hover:bg-[#344053] text-[#4c84f5] rounded-xl py-4 font-semibold text-xl transition-colors shadow-sm flex items-center justify-center">-</button>

          <!-- Row 4 -->
          <button onclick="handleNumber('1')" class="bg-[#283243] hover:bg-[#344053] text-white rounded-xl py-4 font-semibold text-lg transition-colors shadow-sm">1</button>
          <button onclick="handleNumber('2')" class="bg-[#283243] hover:bg-[#344053] text-white rounded-xl py-4 font-semibold text-lg transition-colors shadow-sm">2</button>
          <button onclick="handleNumber('3')" class="bg-[#283243] hover:bg-[#344053] text-white rounded-xl py-4 font-semibold text-lg transition-colors shadow-sm">3</button>
          <button onclick="handleOperator('+')" class="bg-[#283243] hover:bg-[#344053] text-[#4c84f5] rounded-xl py-4 font-semibold text-xl transition-colors shadow-sm flex items-center justify-center">+</button>

          <!-- Row 5 -->
          <button onclick="handleNumber('0')" class="col-span-2 bg-[#283243] hover:bg-[#344053] text-white rounded-xl py-4 font-semibold text-lg transition-colors shadow-sm">0</button>
          <button onclick="handleDot()" class="bg-[#283243] hover:bg-[#344053] text-white rounded-xl py-4 font-bold text-xl transition-colors shadow-sm">.</button>
          <button onclick="handleEqual()" class="bg-[#3c78e6] hover:bg-[#4682f0] text-white rounded-xl py-4 font-semibold text-2xl transition-colors shadow-sm flex items-center justify-center pb-5">=</button>
        </div>

      </div>
    </div>

  </main>

  <!-- Footer -->
  <footer class="py-6 text-center text-xs text-slate-500 font-medium">
    © 2026 DailyOS Digital Toolbox. Powered by Glowzy.
  </footer>

  <!-- Calculator Logic -->
  <script>
    let current = '0';
    let previous = null;
    let operator = null;
    let resetNext = false;

    const displayEl = document.getElementById('display');

    function updateDisplay() {
      displayEl.textContent = formatDisplay(current);
    }

    function formatDisplay(numStr) {
      if (numStr === 'Error') return numStr;
      const maxLen = 10;
      if (numStr.length > maxLen) {
        const num = parseFloat(numStr);
        if (!isNaN(num)) {
          // If it's a huge number or tiny decimal, use exponential, otherwise just slice
          if (num > 999999999 || (num > 0 && num < 0.00000001)) {
            return num.toExponential(4);
          }
          return numStr.slice(0, maxLen);
        }
      }
      return numStr;
    }

    window.handleNumber = function(num) {
      if (resetNext) {
        current = String(num);
        resetNext = false;
      } else {
        if (current === '0') {
          current = String(num);
        } else {
          current = current + String(num);
        }
      }
      updateDisplay();
    };

    window.handleDot = function() {
      if (resetNext) {
        current = '0.';
        resetNext = false;
      } else if (!current.includes('.')) {
        current = current + '.';
      }
      updateDisplay();
    };

    function calculate(a, b, op) {
      const num1 = parseFloat(a);
      const num2 = parseFloat(b);
      if (isNaN(num1) || isNaN(num2)) return '';
      
      let result = 0;
      switch (op) {
        case '+': result = num1 + num2; break;
        case '-': result = num1 - num2; break;
        case '×': result = num1 * num2; break;
        case '÷': 
          if (num2 === 0) return 'Error';
          result = num1 / num2; 
          break;
        default: return b;
      }
      
      // Fix floating point precision issues (e.g., 0.1 + 0.2)
      return String(Math.round(result * 100000000) / 100000000);
    }

    window.handleOperator = function(op) {
      if (current === 'Error') {
        current = '0';
        previous = null;
      }

      if (previous !== null && !resetNext && operator !== null) {
        const res = calculate(previous, current, operator);
        current = res;
        previous = res;
      } else {
        previous = current;
      }
      
      operator = op;
      resetNext = true;
      updateDisplay();
    };

    window.handleEqual = function() {
      if (operator === null || previous === null || current === 'Error') return;
      
      const res = calculate(previous, current, operator);
      current = res;
      previous = null;
      operator = null;
      resetNext = true;
      updateDisplay();
    };

    window.handleClear = function() {
      current = '0';
      previous = null;
      operator = null;
      resetNext = false;
      updateDisplay();
    };

    window.handleDelete = function() {
      if (resetNext || current === 'Error') {
        window.handleClear();
        return;
      }
      if (current.length === 1 || (current.length === 2 && current.startsWith('-'))) {
        current = '0';
      } else {
        current = current.slice(0, -1);
      }
      updateDisplay();
    };
  </script>
</body>
</html>
