<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DailyOS - GPA Calculator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0b0f1a;
            color: #ffffff;
            min-height: 100vh;
        }
        .glass-card {
            background-color: #161d2f;
            border: 1px solid #2d3748;
        }
        .input-field {
            background-color: #1f2937;
            border: 1px solid #374151;
            color: white;
        }
        .input-field:focus {
            border-color: #3b82f6;
            outline: none;
        }
        .btn-primary {
            background-color: #2563eb;
            transition: background-color 0.2s;
        }
        .btn-primary:hover {
            background-color: #1d4ed8;
        }
        .btn-secondary {
            background-color: #1e293b;
            border: 1px solid #3b82f633;
        }
        .btn-secondary:hover {
            background-color: #2d3748;
        }
        /* Custom scrollbar for webkit */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #0b0f1a;
        }
        ::-webkit-scrollbar-thumb {
            background: #2d3748;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #4a5568;
        }
    </style>
</head>
<body class="flex flex-col">

    <!-- Header -->
    <header class="flex justify-between items-center px-6 py-4 w-full max-w-7xl mx-auto">
        <div class="flex items-center gap-2">
            <div class="w-8 h-8 bg-blue-600 rounded flex items-center justify-center">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 text-white" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="20" height="14" x="2" y="7" rx="2" ry="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg>
            </div>
            <span class="text-xl font-bold tracking-tight">Daily<span class="text-blue-500">OS</span></span>
        </div>
        <button class="p-2 rounded-full hover:bg-gray-800 transition-colors">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 text-yellow-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707m12.728 0l-.707-.707M6.343 6.343l-.707-.707M12 5a7 7 0 100 14 7 7 0 000-14z" />
            </svg>
        </button>
    </header>

    <main class="flex-grow flex flex-col items-center px-4 py-8">
        <div class="w-full max-w-4xl">
            <!-- Back Button -->
            <a href="student.html" class="inline-flex items-center gap-2 text-gray-400 hover:text-white transition-all group mb-8">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 transform group-hover:-translate-x-1 transition-transform" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
                </svg>
                <span>Back</span>
            </a>

            <!-- Page Title -->
            <div class="flex items-center justify-center gap-3 mb-10">
                <span class="text-3xl">🎓</span>
                <h1 class="text-3xl font-bold">GPA Calculator</h1>
            </div>

            <!-- Calculator Container -->
            <div class="glass-card rounded-2xl p-6 md:p-10 shadow-2xl">
                <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 mb-8">
                    <p class="text-gray-400">Add your courses, credits, and achieved grades.</p>
                    <button onclick="addCourse()" class="btn-secondary px-4 py-2 rounded-lg flex items-center gap-2 text-blue-400 font-medium transition-all hover:scale-105">
                        <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
                        </svg>
                        Add Course
                    </button>
                </div>

                <!-- Table Header (Desktop Only) -->
                <div class="hidden md:grid grid-cols-12 gap-4 px-2 mb-4 text-xs font-bold text-gray-500 uppercase tracking-widest">
                    <div class="col-span-6">Course Name</div>
                    <div class="col-span-2">Credits</div>
                    <div class="col-span-3">Grade</div>
                    <div class="col-span-1"></div>
                </div>

                <!-- Course List -->
                <div id="course-list" class="space-y-4">
                    <!-- Initial rows will be injected here -->
                </div>

                <!-- Action Button -->
                <div class="mt-10">
                    <button onclick="calculateGPA()" class="w-full btn-primary text-white font-bold py-4 rounded-xl shadow-lg hover:shadow-blue-500/20 active:scale-[0.98] transition-all">
                        Calculate GPA
                    </button>
                </div>

                <!-- Result Display (Hidden by default) -->
                <div id="result-container" class="mt-8 hidden animate-fade-in">
                    <div class="bg-blue-600/10 border border-blue-500/30 rounded-xl p-6 text-center">
                        <p class="text-gray-400 text-sm mb-1 uppercase tracking-widest">Your Estimated GPA</p>
                        <h2 id="gpa-result" class="text-5xl font-black text-blue-400">0.00</h2>
                        <div class="mt-4 flex justify-center gap-4 text-xs text-gray-400">
                            <span id="total-credits-display">Total Credits: 0</span>
                            <span id="total-points-display">Total Points: 0</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="py-10 text-center text-gray-500 text-sm">
        <p>© 2026 DailyOS Digital Toolbox. Powered by Glowzy.</p>
    </footer>

    <script>
        let courses = [
            { id: 1, name: '', credits: '', grade: '' },
            { id: 2, name: '', credits: '', grade: '' },
            { id: 3, name: '', credits: '', grade: '' }
        ];

        // Updated grade points to match image labels and values
        const gradePoints = {
            'A / A+ (4.00)': 4.00,
            'A- (3.75)': 3.75,
            'B+ (3.50)': 3.50,
            'B (3.25)': 3.25,
            'B- (3.00)': 3.00,
            'C+ (2.75)': 2.75,
            'C (2.50)': 2.50,
            'D (2.25)': 2.25,
            'F (0.00)': 0.00
        };

        function renderCourses() {
            const container = document.getElementById('course-list');
            container.innerHTML = '';

            courses.forEach((course, index) => {
                const row = document.createElement('div');
                row.className = 'grid grid-cols-1 md:grid-cols-12 gap-4 bg-gray-800/30 md:bg-transparent p-4 md:p-0 rounded-xl border md:border-0 border-gray-700 md:items-center animate-in fade-in slide-in-from-top-2 duration-300';
                
                row.innerHTML = `
                    <div class="md:col-span-6">
                        <label class="block md:hidden text-xs text-gray-500 mb-1 uppercase font-bold">Course Name</label>
                        <input type="text" 
                               value="${course.name}" 
                               placeholder="Course ${index + 1}" 
                               onchange="updateCourse(${course.id}, 'name', this.value)"
                               class="input-field w-full px-4 py-3 rounded-lg">
                    </div>
                    <div class="md:col-span-2">
                        <label class="block md:hidden text-xs text-gray-500 mb-1 uppercase font-bold">Credits</label>
                        <input type="number" 
                               value="${course.credits}" 
                               placeholder="e.g. 3" 
                               min="0"
                               onchange="updateCourse(${course.id}, 'credits', this.value)"
                               class="input-field w-full px-4 py-3 rounded-lg text-center">
                    </div>
                    <div class="md:col-span-3">
                        <label class="block md:hidden text-xs text-gray-500 mb-1 uppercase font-bold">Grade</label>
                        <select onchange="updateCourse(${course.id}, 'grade', this.value)"
                                class="input-field w-full px-4 py-3 rounded-lg appearance-none cursor-pointer">
                            <option value="">Select</option>
                            ${Object.keys(gradePoints).map(g => `<option value="${g}" ${course.grade === g ? 'selected' : ''}>${g}</option>`).join('')}
                        </select>
                    </div>
                    <div class="md:col-span-1 flex justify-end">
                        <button onclick="removeCourse(${course.id})" class="p-2 text-red-500 hover:bg-red-500/10 rounded-lg transition-colors">
                            <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                            </svg>
                        </button>
                    </div>
                `;
                container.appendChild(row);
            });
        }

        function addCourse() {
            courses.push({ id: Date.now(), name: '', credits: '', grade: '' });
            renderCourses();
        }

        function removeCourse(id) {
            if (courses.length > 1) {
                courses = courses.filter(c => c.id !== id);
                renderCourses();
            }
        }

        function updateCourse(id, field, value) {
            const course = courses.find(c => c.id === id);
            if (course) {
                course[field] = value;
            }
        }

        function calculateGPA() {
            let totalCredits = 0;
            let totalGradePoints = 0;
            let validRows = 0;

            courses.forEach(course => {
                const credits = parseFloat(course.credits);
                const grade = course.grade;

                if (!isNaN(credits) && credits > 0 && gradePoints[grade] !== undefined) {
                    totalCredits += credits;
                    totalGradePoints += (credits * gradePoints[grade]);
                    validRows++;
                }
            });

            const resultContainer = document.getElementById('result-container');
            const gpaDisplay = document.getElementById('gpa-result');
            const creditsDisplay = document.getElementById('total-credits-display');
            const pointsDisplay = document.getElementById('total-points-display');

            if (validRows > 0 && totalCredits > 0) {
                const gpa = (totalGradePoints / totalCredits).toFixed(2);
                gpaDisplay.innerText = gpa;
                creditsDisplay.innerText = `Total Credits: ${totalCredits}`;
                pointsDisplay.innerText = `Total Points: ${totalGradePoints.toFixed(1)}`;
                
                resultContainer.classList.remove('hidden');
                resultContainer.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            } else {
                showMessage("Please fill in credits and grades for at least one course.");
            }
        }

        function showMessage(msg) {
            const toast = document.createElement('div');
            toast.className = 'fixed bottom-8 right-8 bg-gray-800 text-white px-6 py-3 rounded-lg border border-gray-700 shadow-2xl animate-bounce';
            toast.innerText = msg;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        // Initial Render
        window.onload = renderCourses;
    </script>
</body>
</html>
